<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진급/졸업 — 키드키즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="operation-sidebar.js" defer></script>
<script src="operation-header.js" defer></script>
<style>
:root {
  --sidebar-bg:#0C2D48; --sidebar-hover:#1A4A6B; --sidebar-active:#1E5580;
  --sidebar-text:#B8D9F0; --sidebar-width:240px; --header-height:60px;
  --accent:#0EA5E9; --accent-light:#E0F2FE; --accent-dark:#0284C7;
  --bg-base:#F0F7FF; --bg-surface:#FFFFFF;
  --text-primary:#0C2D48; --text-secondary:#4B7FA3; --text-muted:#94B8D0;
  --border-light:#DBEAFE; --border-medium:#BAD9F7;
  --green:#10B981; --green-bg:#D1FAE5; --green-text:#065F46;
  --blue:#3B82F6; --blue-bg:#DBEAFE; --blue-text:#1E40AF;
  --amber:#F59E0B; --amber-bg:#FEF3C7; --amber-text:#92400E;
  --red:#EF4444; --red-bg:#FEE2E2; --red-text:#991B1B;
  --purple:#8B5CF6; --purple-bg:#EDE9FE; --purple-text:#5B21B6;
  --shadow-sm:0 1px 3px rgba(12,45,72,0.06);
  --shadow-md:0 4px 12px rgba(12,45,72,0.09);
  --shadow-lg:0 8px 28px rgba(12,45,72,0.11);
  --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-xl:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--bg-base);color:var(--text-primary);display:flex;height:100vh;overflow:hidden;}

/* MAIN */
.main-wrap{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{height:var(--header-height);background:var(--bg-surface);border-bottom:1px solid var(--border-light);display:flex;align-items:center;padding:0 24px;gap:12px;box-shadow:var(--shadow-sm);flex-shrink:0;z-index:50;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text-secondary);flex:1;}
.breadcrumb .cur{color:var(--text-primary);font-weight:600;}
.bc-sep{color:var(--text-muted);font-size:12px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-date{font-size:13px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;background:var(--bg-base);border:1px solid var(--border-light);cursor:pointer;transition:0.18s;font-size:16px;}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:22px 24px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:3px;}
.content-inner{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:21px;font-weight:800;letter-spacing:-0.5px;}
.page-sub{font-size:14px;color:var(--text-secondary);margin-top:3px;}
.header-right{display:flex;align-items:center;gap:12px;}
.year-chip{background:var(--accent-light);color:var(--accent-dark);padding:6px 12px;border-radius:var(--radius-lg);font-size:13px;font-weight:600;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi-card{background:var(--bg-surface);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);display:flex;align-items:center;gap:12px;}
.kpi-ico{width:46px;height:46px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.kpi-ico.sky{background:#E0F2FE;} .kpi-ico.green{background:var(--green-bg);} .kpi-ico.blue{background:var(--blue-bg);} .kpi-ico.purple{background:var(--purple-bg);}
.kpi-label{font-size:12px;color:var(--text-secondary);font-weight:500;margin-bottom:2px;}
.kpi-value{font-size:24px;font-weight:800;color:var(--text-primary);letter-spacing:-0.8px;line-height:1;}
.kpi-sub{font-size:13px;color:var(--text-muted);margin-top:3px;}

/* TABS */
.tab-bar{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border-light);}
.tab{padding:12px 24px;font-size:14px;font-weight:600;color:var(--text-secondary);cursor:pointer;border:none;background:none;transition:0.18s;position:relative;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab:hover{color:var(--text-primary);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* FILTER BAR */
.filter-bar{background:var(--bg-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);padding:14px 18px;border:1px solid var(--border-light);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.filter-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.filter-row{display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap;}
.filter-row + .filter-row{padding-top:10px;border-top:1px solid var(--border-light);}
.filter-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.2px;white-space:nowrap;}
.filter-summary{font-size:13px;color:var(--text-secondary);}
.filter-summary strong{color:var(--text-primary);font-weight:700;}
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border-light);background:var(--bg-surface);color:var(--text-secondary);transition:0.18s;}
.chip:hover{background:var(--accent-light);color:var(--accent-dark);}
.chip.active{background:var(--accent);color:white;border-color:var(--accent);}
.filter-select{padding:6px 10px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);font-size:13px;background:white;color:var(--text-primary);cursor:pointer;font-family:inherit;height:34px;}
.filter-select:focus{outline:none;border-color:var(--accent);}
.filter-search-wrap{display:flex;align-items:center;border:1.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;background:white;transition:.18s;}
.filter-search-wrap:focus-within{border-color:var(--accent);}
.filter-search{padding:0 10px;border:none;outline:none;font-size:13px;font-family:inherit;height:34px;min-width:160px;background:transparent;color:var(--text-primary);}
.filter-search-btn{height:34px;padding:0 12px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:.18s;}
.filter-search-btn:hover{background:#2f4dd4;}
.filter-divider{width:1px;height:20px;background:var(--border-medium);}
.btn{padding:8px 14px;border-radius:var(--radius-md);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:0.18s;height:36px;display:flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-secondary{background:var(--bg-surface);color:var(--text-primary);border:1.5px solid var(--border-medium);}
.btn-secondary:hover{background:var(--accent-light);border-color:var(--accent);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1.5px solid transparent;}
.btn-ghost:hover{background:var(--bg-base);color:var(--text-primary);border-color:var(--border-light);}
.btn-sm{height:30px;padding:6px 10px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none;}

/* ACTION BAR */
.action-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.action-left{display:flex;align-items:center;gap:8px;}
.action-right{display:flex;align-items:center;gap:8px;}
.total-count{font-size:14px;color:var(--text-secondary);}
.total-count strong{color:var(--text-primary);font-weight:700;}
.sel-count{font-size:13px;color:var(--text-secondary);}
.sel-count strong{color:var(--accent-dark);font-weight:700;}
.divider-v{width:1px;height:16px;background:var(--border-medium);}

/* TABLE */
.table-card{background:var(--bg-surface);border-radius:var(--radius-xl);border:1px solid var(--border-light);box-shadow:var(--shadow-sm);overflow:hidden;display:flex;flex-direction:column;}
.table-body{flex:1;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:12px;font-weight:700;color:var(--text-secondary);text-align:left;padding:10px 12px;border-bottom:1.5px solid var(--border-light);background:var(--bg-base);white-space:nowrap;position:sticky;top:0;z-index:1;}
.data-table td{font-size:13px;padding:11px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr{cursor:pointer;transition:background 0.15s;}
.data-table tbody tr:hover td{background:#F8FCFF;}
.data-table tbody tr.row-checked td{background:#EFF8FF;}
.data-table tbody tr.row-checked:hover td{background:#E0F2FE;}
.data-table tbody tr.row-highlight td{background:#FEF3C7 !important;animation:flashHighlight 1.5s ease;}
@keyframes flashHighlight{0%{background:#FEF9C3;}100%{background:#FEF3C7;}}
.data-table input[type="checkbox"]{width:14px;height:14px;cursor:pointer;accent-color:var(--accent);}
.name-wrap{display:flex;align-items:center;gap:8px;}
.child-avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;}
.child-avatar img{width:32px;height:32px;border-radius:50%;object-fit:cover;display:block;}
.main-name{font-size:14px;font-weight:700;color:var(--text-primary);}
.sub-name{font-size:12px;color:var(--text-muted);}
.class-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:12px;font-weight:600;background:var(--accent-light);color:var(--accent-dark);white-space:nowrap;}
.enroll-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-secondary);}
.status-select{padding:6px 10px;border:1.5px solid var(--border-light);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;background:white;color:var(--text-primary);min-width:112px;}
.status-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600;}
.status-promoted{background:var(--blue-bg);color:var(--blue-text);}
.status-graduated{background:var(--purple-bg);color:var(--purple-text);}
.status-hold{background:var(--amber-bg);color:var(--amber-text);}
.status-promoted-auto{background:var(--green-bg);color:var(--green-text);}
.status-pending{background:var(--bg-base);color:var(--text-secondary);}
.status-stack{display:flex;flex-direction:column;align-items:flex-start;gap:6px;}
.status-detail{font-size:12px;line-height:1.5;color:var(--amber-text);}
.row-action{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.row-action .btn{min-width:54px;justify-content:center;}
.processed-by{font-size:12px;color:var(--text-secondary);}
.processed-at{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);}
.result-cell{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.result-edit-btn{padding:0;border:none;background:none;color:var(--accent-dark);font-size:12px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;}
.result-edit-btn:hover{text-decoration:underline;}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:14px 16px;border-top:1px solid var(--border-light);}
.page-btn{min-width:32px;height:32px;padding:0 6px;border-radius:var(--radius-md);border:1.5px solid var(--border-light);background:var(--bg-surface);font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.15s;font-family:'Pretendard',sans-serif;}
.page-btn:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
.page-btn:disabled{opacity:.4;cursor:not-allowed;}
.page-info{font-size:12px;color:var(--text-muted);margin-left:8px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:none;align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.18s ease;}
.modal-overlay.show{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--bg-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);max-width:480px;width:90%;max-height:90vh;display:flex;flex-direction:column;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-base);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);}
.modal-close:hover{background:var(--border-light);}
.modal-body{flex:1;overflow-y:auto;padding:20px 24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}

/* OVERLAY */
.progress-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:110;animation:fadeIn 0.18s ease;}
.progress-overlay.show{display:flex;}
.progress-spinner{background:var(--bg-surface);border-radius:var(--radius-xl);padding:40px;text-align:center;box-shadow:var(--shadow-lg);}
.spinner{width:48px;height:48px;border:4px solid var(--border-light);border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.spinner-text{font-size:14px;font-weight:600;color:var(--text-primary);}
.spinner-count{font-size:12px;color:var(--text-muted);margin-top:8px;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;color:var(--text-secondary);}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-primary);}
.form-input,.form-select{width:100%;padding:8px 12px;border:1px solid var(--border-light);border-radius:var(--radius-md);font-size:13px;font-family:inherit;background:white;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* TOAST */
.toast{position:fixed;bottom:80px;right:24px;background:var(--bg-surface);padding:12px 16px;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);font-size:13px;z-index:120;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{transform:translateX(400px);}to{transform:translateX(0);}}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--accent);}

/* RESPONSIVE */
@media(max-width:1200px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="appSidebar"></aside>

<!-- MAIN -->
<div class="main-wrap">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="breadcrumb">
      <span>운영관리</span>
      <span class="bc-sep">/</span>
      <span class="cur">진급/졸업</span>
    </div>
    <div class="topbar-right" id="topbarRight"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="content-inner">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div>
        <div class="page-title">진급/졸업</div>
        <div class="page-sub">자동 제안 결과를 확인하고 처리를 완료해주세요.</div>
      </div>
      <div class="header-right">
        <div class="year-chip">📅 2026년</div>
      </div>
    </div>

    <!-- KPI GRID -->
    <div class="kpi-grid" id="kpiGrid">
      <!-- JS로 렌더링 -->
    </div>

    <!-- TABS -->
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('processing')">처리</button>
      <button class="tab" onclick="switchTab('completed')">완료</button>
    </div>

    <!-- PROCESSING TAB -->
    <div id="processingTab" class="tab-content">
      <!-- FILTER BAR -->
      <div class="filter-bar">
        <div class="filter-row">
          <select class="filter-select" id="processingStatusFilter">
            <option value="all">전체 상태</option>
            <option value="promoted">진급대상</option>
            <option value="graduated">졸업대상</option>
            <option value="hold">보류</option>
          </select>
          <div class="filter-divider"></div>
          <select class="filter-select" id="processingAgeFilter">
            <option value="">전체 나이</option>
            <option value="1세">1세</option>
            <option value="2세">2세</option>
            <option value="3세">3세</option>
            <option value="4세">4세</option>
            <option value="5세">5세</option>
            <option value="6세">6세</option>
            <option value="7세">7세</option>
          </select>
          <div class="filter-divider"></div>
          <select class="filter-select" id="processingClassFilter">
            <option value="">전체 반</option>
            <option value="꽃잎반">꽃잎반</option>
            <option value="나무반">나무반</option>
            <option value="송이반">송이반</option>
            <option value="해반">해반</option>
            <option value="별반">별반</option>
          </select>
          <div class="filter-divider"></div>
          <div class="filter-search-wrap">
            <input type="text" class="filter-search" id="processingNameSearch" placeholder="원아 이름 검색" onkeydown="if(event.key==='Enter') applyProcessingFilter()">
            <button class="filter-search-btn" onclick="applyProcessingFilter()">검색</button>
          </div>
        </div>
      </div>

      <!-- ACTION BAR -->
      <div class="action-bar">
        <div class="action-left">
          <span class="total-count">총 <strong id="processingCount">0</strong>건</span>
          <span class="divider-v"></span>
          <span class="sel-count" id="selectionSummary">선택 <strong>0</strong>명</span>
        </div>
        <div class="action-right" style="margin: 20px 0;">
          <button type="button" class="btn btn-outline btn-sm" id="selectAllBtn" onclick="toggleSelectAllVisible()">전체선택</button>
          <button class="btn btn-outline btn-sm" id="promoteSelectedBtn" onclick="bulkAction('promoted')">선택진급</button>
          <button class="btn btn-outline btn-sm" id="graduateSelectedBtn" onclick="bulkAction('graduated')">선택졸업</button>
          <button class="btn btn-outline btn-sm" id="holdSelectedBtn" onclick="bulkAction('on_hold')">보류처리</button>
          <button class="btn btn-primary btn-sm" id="applySuggestedBtn" onclick="applySuggestedStatuses()">자동제안 전체적용</button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-card">
        <div class="table-body">
          <div style="overflow-x:auto">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width:40px"><input type="checkbox" id="checkAllProcessing" onchange="toggleSelectAllVisible()" onclick="event.stopPropagation()"></th>
                  <th style="width:200px">원아</th>
                  <th style="width:70px">만나이</th>
                  <th style="width:100px">반</th>
                  <th style="width:120px">주보호자</th>
                  <th style="width:130px">입소일</th>
                  <th style="width:170px">처리상태</th>
                  <th style="text-align:right">자동제안결과</th>
                </tr>
              </thead>
              <tbody id="processingTableBody">
                <!-- JS로 렌더링 -->
              </tbody>
            </table>
          </div>
        </div>
        <div id="processingPagination" class="pagination" style="display:none;"></div>
      </div>
    </div>

    <!-- COMPLETED TAB -->
    <div id="completedTab" class="tab-content" style="display:none;">
      <!-- FILTER BAR -->
      <div class="filter-bar">
        <div class="filter-row">
          <select class="filter-select" id="completedStatusFilter">
            <option value="all">전체 상태</option>
            <option value="promoted">진급</option>
            <option value="graduated">졸업</option>
          </select>
          <div class="filter-divider"></div>
          <select class="filter-select" id="completedAgeFilter">
            <option value="">전체 나이</option>
            <option value="1세">1세</option>
            <option value="2세">2세</option>
            <option value="3세">3세</option>
            <option value="4세">4세</option>

let processingPage = 1;
let completedPage = 1;
const PAGE_SIZE = 15;

function isProcessingTarget(child) {
  return !child.graduation_status || child.graduation_status === 'on_hold';
}

function isCompletedTarget(child) {
  return !!child.graduation_status && child.graduation_status !== 'on_hold';
}

function getResolvedStatusChange(child) {
  const draft = statusChanges[child.id] || {};
  const currentStatus = child.graduation_status === 'on_hold' ? 'on_hold' : (child.graduation_status || child.graduation_suggestion);
  return {
    status: draft.status || currentStatus,
    reason: draft.reason !== undefined ? draft.reason : (child.hold_reason || ''),
    memo: draft.memo !== undefined ? draft.memo : (child.hold_memo || '')
  };
}

function getHoldReasonText(reason, memo) {
  if (!reason) return '-';
  if (reason === '기타') return memo || reason;
  return memo ? `${reason} · ${memo}` : reason;
}

function renderProcessingStatusCell(child) {
  if (child.graduation_status === 'on_hold') {
    return `
      <div class="status-stack">
        <span class="status-badge status-hold">보류</span>
        <div class="status-detail">보류사유: ${getHoldReasonText(child.hold_reason, child.hold_memo)}</div>
      </div>
    `;
  }
  return `<span class="status-badge status-pending">미확정</span>`;
}

// ═══════════════ KPI ═══════════════

// ═══════════════ AVATAR HELPER ═══════════════
function avatarHtml(c) {
  if (c.thumb) {
    return `<div class="child-avatar"><img src="${c.thumb}" alt="${c.name}" onerror="this.parentElement.innerHTML='<span style=line-height:32px>${c.name.charAt(0)}</span>';this.parentElement.style.background='${c.profile_color}';"></div>`;
  }
  return `<div class="child-avatar" style="background:${c.profile_color}">${c.name.charAt(0)}</div>`;
}

// ═══════════════ PROCESSING TAB ═══════════════
function renderProcessingTab() {
  const data = getFilteredProcessingData();
  document.getElementById('processingCount').textContent = data.length;
  renderProcessingTable(data);
  updateSelectionControls();
}

function getFilteredProcessingData() {
  let data = MOCK_CHILDREN.filter(isProcessingTarget);
  if (currentProcessingFilter === 'hold') {
    data = data.filter(c => c.graduation_status === 'on_hold');
  } else if (currentProcessingFilter !== 'all') {
    data = data.filter(c => !c.graduation_status && c.graduation_suggestion === currentProcessingFilter);
  }
  const age = document.getElementById('processingAgeFilter')?.value || '';
  const cls = document.getElementById('processingClassFilter')?.value || '';
  const name = (document.getElementById('processingNameSearch')?.value || '').trim();
  if (age) data = data.filter(c => c.age === age);
  if (cls) data = data.filter(c => c.class_name === cls);
  if (name) data = data.filter(c => c.name.includes(name));
  return data;
}

function applyProcessingSearch() {
  processingPage = 1;
  const data = getFilteredProcessingData();
  document.getElementById('processingCount').textContent = data.length;
  renderProcessingTable(data);
  updateSelectionControls();
}

function renderProcessingTable(data) {
  const tbody = document.getElementById('processingTableBody');
  const paginationEl = document.getElementById('processingPagination');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px 20px;"><div class="empty-text">조건에 맞는 원아가 없습니다</div></td></tr>';
    paginationEl.style.display = 'none';
    updateSelectionControls();
    return;
  }
  const totalPages = Math.ceil(data.length / PAGE_SIZE);
  if (processingPage > totalPages) processingPage = totalPages;
  const paged = data.slice((processingPage - 1) * PAGE_SIZE, processingPage * PAGE_SIZE);
  tbody.innerHTML = paged.map(c => {
    const cls = [];
    if (selectedIds.has(c.id)) cls.push('row-checked');
    if (recentlyHeldIds.has(c.id)) cls.push('row-highlight');
    return `
    <tr class="${cls.join(' ')}" onclick="handleRowClick(event, '${c.id}')">
      <td><input type="checkbox" data-id="${c.id}" onchange="toggleSelect('${c.id}', this.checked)" ${selectedIds.has(c.id) ? 'checked' : ''} onclick="event.stopPropagation()"></td>
      <td>
        <div class="name-wrap">
          ${avatarHtml(c)}
          <div>
            <div class="main-name">${c.name}</div>
            <div class="sub-name">${c.birth}</div>
          </div>
        </div>
      </td>
      <td>${c.age}</td>
      <td><span class="class-badge">${c.class_name}</span></td>
      <td>${c.primary_parent_name || '-'}</td>
      <td class="enroll-date">${c.enroll_date || '-'}</td>
      <td>${renderProcessingStatusCell(c)}</td>
      <td>
        <div class="row-action" onclick="event.stopPropagation()">
          <select class="status-select" onchange="setStatusChange('${c.id}', this.value)">
            <option value="promoted" ${getResolvedStatusChange(c).status === 'promoted' ? 'selected' : ''}>진급</option>
            <option value="graduated" ${getResolvedStatusChange(c).status === 'graduated' ? 'selected' : ''}>졸업</option>
            <option value="on_hold" ${getResolvedStatusChange(c).status === 'on_hold' ? 'selected' : ''}>보류</option>
          </select>
          <button class="btn btn-secondary btn-sm" onclick="processSingleChild('${c.id}')">처리</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  renderPagination('processingPagination', data.length, processingPage, 'goProcessingPage');
  updateSelectionControls();
}

        </div>
      </td>
      <td><span class="processed-by">${c.processed_by || '-'}</span></td>
      <td><span class="processed-at">${c.processed_at || '-'}</span></td>
    </tr>
  `).join('');
  renderPagination('completedPagination', data.length, completedPage, 'goCompletedPage');
  updateSelectionControls();
}

// ═══════════════ INTERACTIONS ═══════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('processingTab').style.display = tab === 'processing' ? 'block' : 'none';
  document.getElementById('completedTab').style.display = tab === 'completed' ? 'block' : 'none';
  selectedIds.clear();
  statusChanges = {};
  renderProcessingTable(getFilteredProcessingData());
  renderCompletedTable(getFilteredCompletedData());
}

function handleRowClick(e, id) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
  const child = MOCK_CHILDREN.find(c => c.id === id);
  if (!child) return;
  const checked = !selectedIds.has(id);
  toggleSelect(id, checked);
  const cb = document.querySelector(`input[data-id="${id}"]`);
  if (cb) cb.checked = checked;
  const row = cb?.closest('tr');
  if (row) row.classList.toggle('row-checked', checked);
}

function getVisibleProcessingIds() {
  const data = getFilteredProcessingData();
  return data.slice((processingPage - 1) * PAGE_SIZE, processingPage * PAGE_SIZE).map(c => c.id);
}

function getVisibleCompletedIds() {
  const data = getFilteredCompletedData();
  return data.slice((completedPage - 1) * PAGE_SIZE, completedPage * PAGE_SIZE).map(c => c.id);
}

function getSelectedPendingIds() {
  return Array.from(selectedIds).filter(id => {
    const child = MOCK_CHILDREN.find(c => c.id === id);
    return child && isProcessingTarget(child);
  });
}

function getSelectedCompletedIds() {
  return Array.from(selectedIds).filter(id => {
    const child = MOCK_CHILDREN.find(c => c.id === id);
    return child && isCompletedTarget(child);
  });
}

function updateSelectionControls() {
  // ─── Processing tab ───
  const pVisible = getVisibleProcessingIds();
  const pSelectedVisible = pVisible.filter(id => selectedIds.has(id)).length;
  const pTotal = getSelectedPendingIds().length;
  const pAllVisible = pVisible.length > 0 && pSelectedVisible === pVisible.length;

  const selectAllBtn = document.getElementById('selectAllBtn');
  const checkAllProcessing = document.getElementById('checkAllProcessing');
  const selectionSummary = document.getElementById('selectionSummary');
  const promoteBtn = document.getElementById('promoteSelectedBtn');
  const graduateBtn = document.getElementById('graduateSelectedBtn');
  const holdBtn = document.getElementById('holdSelectedBtn');
  const applySuggestedBtn = document.getElementById('applySuggestedBtn');
  const visibleSuggestedIds = pVisible.filter(id => {
    const child = MOCK_CHILDREN.find(c => c.id === id);
    return child && !child.graduation_status;
  });

  if (selectAllBtn) {
    selectAllBtn.textContent = pAllVisible ? '전체해제' : '전체선택';
    selectAllBtn.disabled = pVisible.length === 0;
  }
  if (checkAllProcessing) {
    checkAllProcessing.checked = pAllVisible;
    checkAllProcessing.indeterminate = pSelectedVisible > 0 && !pAllVisible;
  }
  if (selectionSummary) selectionSummary.innerHTML = `선택 <strong>${pTotal}</strong>명`;
  [promoteBtn, graduateBtn, holdBtn].forEach(btn => { if (btn) btn.disabled = pTotal === 0; });
  if (applySuggestedBtn) applySuggestedBtn.disabled = visibleSuggestedIds.length === 0;

  // ─── Completed tab ───
  const cVisible = getVisibleCompletedIds();
  const cSelectedVisible = cVisible.filter(id => selectedIds.has(id)).length;
  const cTotal = getSelectedCompletedIds().length;
  const cAllVisible = cVisible.length > 0 && cSelectedVisible === cVisible.length;

  const cSelectAllBtn = document.getElementById('completedSelectAllBtn');
  const checkAllCompleted = document.getElementById('checkAllCompleted');
  const cSelSummary = document.getElementById('completedSelectionSummary');
  const cPromoteBtn = document.getElementById('completedPromoteBtn');
  const cGraduateBtn = document.getElementById('completedGraduateBtn');
  const cHoldBtn = document.getElementById('completedHoldBtn');

  if (cSelectAllBtn) {
    cSelectAllBtn.textContent = cAllVisible ? '전체해제' : '전체선택';
    cSelectAllBtn.disabled = cVisible.length === 0;
  }
  if (checkAllCompleted) {
    checkAllCompleted.checked = cAllVisible;
    checkAllCompleted.indeterminate = cSelectedVisible > 0 && !cAllVisible;
  }
  if (cSelSummary) cSelSummary.innerHTML = `선택 <strong>${cTotal}</strong>명`;
  [cPromoteBtn, cGraduateBtn, cHoldBtn].forEach(btn => { if (btn) btn.disabled = cTotal === 0; });
}

function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id);
  else selectedIds.delete(id);
  updateSelectionControls();
}

function toggleSelectAllVisible() {
  const visibleIds = getVisibleProcessingIds();
  const allVisibleSelected = visibleIds.length > 0 && visibleIds.every(id => selectedIds.has(id));
  visibleIds.forEach(id => {
    if (allVisibleSelected) selectedIds.delete(id);
    else selectedIds.add(id);
  });
  renderProcessingTable(getFilteredProcessingData());
}

function toggleSelectAllVisibleCompleted() {
  const visibleIds = getVisibleCompletedIds();
  const allVisibleSelected = visibleIds.length > 0 && visibleIds.every(id => selectedIds.has(id));
  visibleIds.forEach(id => {
    if (allVisibleSelected) selectedIds.delete(id);
    else selectedIds.add(id);
  });
  renderCompletedTable(getFilteredCompletedData());
}

function clearSelection() {
  selectedIds.clear();
  renderProcessingTable(getFilteredProcessingData());
  renderCompletedTable(getFilteredCompletedData());
}

function setStatusChange(id, status) {
  if (!status) {
    delete statusChanges[id];
  } else {
    const prev = statusChanges[id] || {};
    statusChanges[id] = {
      status,
      reason: status === 'on_hold' ? (prev.reason || '') : '',
      memo: status === 'on_hold' ? (prev.memo || '') : ''
    };
  }
}

function bulkAction(status) {
  const targets = getSelectedPendingIds();
  if (targets.length === 0) {
    showToast('먼저 처리할 원아를 선택해 주세요', 'info');
    return;
  }
  targets.forEach(id => {
    const prev = statusChanges[id] || {};
    statusChanges[id] = {
      status,
      reason: status === 'on_hold' ? (prev.reason || '') : '',
      memo: status === 'on_hold' ? (prev.memo || '') : ''
    };
  });
  selectedIds = new Set(targets);
  openStatusChangeModal();
}

function bulkActionCompleted(status) {
  const targets = getSelectedCompletedIds();
  if (targets.length === 0) {
    showToast('먼저 변경할 원아를 선택해 주세요', 'info');
    return;
  }
  targets.forEach(id => {
    const child = MOCK_CHILDREN.find(c => c.id === id);
    const prev = statusChanges[id] || {};
    statusChanges[id] = {
      status,
      reason: status === 'on_hold' ? (prev.reason || child?.hold_reason || '') : '',
      memo: status === 'on_hold' ? (prev.memo || child?.hold_memo || '') : ''
    };
  });
  selectedIds = new Set(targets);
  openStatusChangeModal();
}

function applySuggestedStatuses() {
  const targets = getVisibleProcessingIds().filter(id => {
    const child = MOCK_CHILDREN.find(c => c.id === id);
    return child && !child.graduation_status;
  });
  if (targets.length === 0) {
    showToast('현재 목록에 적용할 원아가 없습니다', 'info');
    return;
  }
  targets.forEach(id => {
    const child = MOCK_CHILDREN.find(c => c.id === id);
    if (!child) return;
    statusChanges[id] = { status: child.graduation_suggestion, reason: '', memo: '' };
  });
  selectedIds = new Set(targets);
  renderProcessingTable(getFilteredProcessingData());
  openStatusChangeModal();
}

function processSingleChild(id) {
  const child = MOCK_CHILDREN.find(c => c.id === id);
  if (!child || !isProcessingTarget(child)) return;
  const current = getResolvedStatusChange(child);
  statusChanges[id] = {
    status: current.status,
    reason: current.status === 'on_hold' ? current.reason : '',
    memo: current.status === 'on_hold' ? current.memo : ''
  };
  selectedIds = new Set([id]);
  renderProcessingTable(getFilteredProcessingData());
  openStatusChangeModal();
}

function openCompletedResultChange(id) {
  const child = MOCK_CHILDREN.find(c => c.id === id);
  if (!child || !isCompletedTarget(child)) return;
  const current = getResolvedStatusChange(child);
  statusChanges[id] = {
    status: current.status,
    reason: current.reason,
    memo: current.memo
  };
  selectedIds = new Set([id]);
  openStatusChangeModal();
}

function applyProcessingFilter() {
  currentProcessingFilter = document.getElementById('processingStatusFilter').value || 'all';
  processingPage = 1;
  applyProcessingSearch();
}

function applyCompletedFilter() {
  currentCompletedFilter = document.getElementById('completedStatusFilter').value || 'all';
  completedPage = 1;
  applyCompletedSearch();
}

// ═══════════════ MODALS ═══════════════
function openStatusChangeModal() {
  renderStatusChangeModal();
  statusChangesSnapshot = JSON.stringify(statusChanges);
  document.getElementById('statusChangeModal').classList.add('show');
}

function renderStatusChangeModal() {
  const list = Array.from(selectedIds).map(id => {
    const child = MOCK_CHILDREN.find(c => c.id === id);
    if (!child) return '';
    const change = getResolvedStatusChange(child);
    return `
      <div class="form-group" style="border-bottom:1px solid var(--border-light);padding-bottom:16px;margin-bottom:16px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;">${child.name}</div>
        <select class="form-select" onchange="updateStatusChange('${id}', 'status', this.value)">
          <option value="">선택</option>
          <option value="promoted" ${change.status === 'promoted' ? 'selected' : ''}>진급</option>
          <option value="graduated" ${change.status === 'graduated' ? 'selected' : ''}>졸업</option>
          <option value="on_hold" ${change.status === 'on_hold' ? 'selected' : ''}>보류</option>
        </select>
        ${change.status === 'on_hold' ? `
          <div style="margin-top:12px;">
            <div class="form-label">보류 사유</div>
            <select class="form-select" onchange="updateStatusChange('${id}', 'reason', this.value)" onfocus="this.scrollIntoView({block:'start',behavior:'smooth'});">
              <option value="">선택</option>
              ${HOLD_REASONS.map(r => `<option value="${r}" ${change.reason === r ? 'selected' : ''}>${r}</option>`).join('')}
            </select>
            ${change.reason === '기타' ? `
              <input type="text" class="form-input" placeholder="기타 사유 입력" style="margin-top:8px;" onchange="updateStatusChange('${id}', 'memo', this.value)" onfocus="this.scrollIntoView({block:'start',behavior:'smooth'});" value="${change.memo || ''}">
            ` : ''}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('statusChangeList').innerHTML = list;
  document.getElementById('confirmChangeBtn').textContent = `변경확정(${selectedIds.size})`;
}

function updateStatusChange(id, field, value) {
  if (!statusChanges[id]) statusChanges[id] = {};
  statusChanges[id][field] = value;
  if (field === 'status') {
    if (value !== 'on_hold') {
      statusChanges[id].reason = '';
      statusChanges[id].memo = '';
    }
    renderStatusChangeModal();
  }
}

function handleBackClick() {
  if (JSON.stringify(statusChanges) !== statusChangesSnapshot) {
    document.getElementById('backWarningModal').classList.add('show');
  } else {
    closeModal('statusChangeModal');
  }
}

function confirmStatusChange() {
  let canConfirm = true;
  selectedIds.forEach(id => {
    const change = statusChanges[id];
    if (!change || !change.status) canConfirm = false;
    if (change.status === 'on_hold' && !change.reason) canConfirm = false;
    if (change.reason === '기타' && !change.memo) canConfirm = false;
  });

  if (!canConfirm) {
    showToast('모든 항목을 입력해주세요', 'error');
    return;
  }

  closeModal('statusChangeModal');
  document.getElementById('confirmCount').textContent = selectedIds.size;
  document.getElementById('confirmModal').classList.add('show');
}

function processGraduation() {
  closeModal('confirmModal');
  document.getElementById('progressOverlay').classList.add('show');

  const now = new Date();
  const processedAt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const processedBy = effectiveRole === 'teacher' ? '김교사' : '박원장';

  let total = selectedIds.size;
  let count = 0;

  selectedIds.forEach(id => {
    const change = statusChanges[id];
    const child = MOCK_CHILDREN.find(c => c.id === id);

    setTimeout(() => {
      child.graduation_status = change.status;
      child.processed_by = processedBy;
      child.processed_at = processedAt;
      if (change.status === 'on_hold') {
        child.hold_reason = change.reason;
        child.hold_memo = change.memo;
        child.status = 'enrolled';
      } else {
        child.hold_reason = '';
        child.hold_memo = '';
      }
      if (change.status === 'graduated') {
        child.status = 'graduated';
      } else {
        child.status = 'enrolled';
      }

      count++;
      document.getElementById('progressCount').textContent = `(${count}/${total})`;

      if (count === total) {
        setTimeout(() => {
          document.getElementById('progressOverlay').classList.remove('show');

          const graduated = Array.from(selectedIds).filter(id => statusChanges[id].status === 'graduated');
          if (graduated.length > 0) {
            let saved = JSON.parse(localStorage.getItem('graduation_confirmed') || '{"ids":[]}');
            saved.ids.push(...graduated);
            localStorage.setItem('graduation_confirmed', JSON.stringify(saved));
          }

          const heldTargets = Array.from(selectedIds).filter(id => statusChanges[id]?.status === 'on_hold');
          const hasHold = heldTargets.length > 0;

          renderKPI();

          if (hasHold) {
            currentTab = 'processing';
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === 0));
            document.getElementById('processingTab').style.display = 'block';
            document.getElementById('completedTab').style.display = 'none';
            const statusSel = document.getElementById('processingStatusFilter');
            if (statusSel) statusSel.value = 'hold';
            currentProcessingFilter = 'hold';
            processingPage = 1;
            recentlyHeldIds = new Set(heldTargets);
            selectedIds.clear();
            renderProcessingTab();
            renderCompletedTab();
            setTimeout(() => {
              recentlyHeldIds.clear();
              renderProcessingTable(getFilteredProcessingData());
            }, 1600);
          } else {
            selectedIds.clear();
            renderProcessingTab();
            renderCompletedTab();
          }

          showToast('진급/졸업 처리가 완료되었습니다.', 'success');
        }, 500);
      }
    }, count * 300);
  });
}

// ═══════════════ PAGINATION ═══════════════
function goProcessingPage(p) {
  processingPage = p;
  renderProcessingTable(getFilteredProcessingData());
  updateSelectionControls();
}

function goCompletedPage(p) {
  completedPage = p;
  renderCompletedTable(getFilteredCompletedData());
}

function renderPagination(containerId, total, currentPage, fnName) {
  const el = document.getElementById(containerId);
  const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  if (totalPages <= 1) { el.style.display = 'none'; return; }
  el.style.display = 'flex';

  const groupStart = Math.floor((currentPage - 1) / 10) * 10 + 1;
  const groupEnd   = Math.min(groupStart + 9, totalPages);
  const pages = [];
  for (let p = groupStart; p <= groupEnd; p++) pages.push(p);

  const from = (currentPage - 1) * PAGE_SIZE + 1;
  const to   = Math.min(currentPage * PAGE_SIZE, total);

  el.innerHTML = `
    <button class="page-btn" ${currentPage===1?'disabled':''} onclick="${fnName}(1)" title="처음">«</button>
    <button class="page-btn" ${currentPage===1?'disabled':''} onclick="${fnName}(${currentPage-1})" title="이전">‹</button>
    ${pages.map(p=>`<button class="page-btn${p===currentPage?' active':''}" onclick="${fnName}(${p})">${p}</button>`).join('')}
    <button class="page-btn" ${currentPage===totalPages?'disabled':''} onclick="${fnName}(${currentPage+1})" title="다음">›</button>
    <button class="page-btn" ${currentPage===totalPages?'disabled':''} onclick="${fnName}(${totalPages})" title="끝">»</button>
    <span class="page-info">${from}–${to} / ${total}건</span>
  `;
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function confirmBack() {
  closeModal('backWarningModal');
  closeModal('statusChangeModal');
  try {
    statusChanges = JSON.parse(statusChangesSnapshot || '{}');
  } catch (e) {
    statusChanges = {};
  }
  renderProcessingTable(getFilteredProcessingData());
  renderCompletedTable(getFilteredCompletedData());
}

function showToast(msg, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// INIT
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
