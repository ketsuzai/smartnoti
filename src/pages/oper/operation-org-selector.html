<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운영관리 — 기관 선택</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --accent:       #4361EE;
  --accent-light: #EEF1FD;
  --accent-dark:  #3A0CA3;
  --bg-base:      #F4F5F7;
  --bg-surface:   #FFFFFF;
  --text-primary: #1A1D2E;
  --text-secondary:#6B7280;
  --text-muted:   #9CA3AF;
  --border-light: #E5E7EB;
  --border-medium:#D1D5DB;
  --green:  #10B981; --green-bg:  #D1FAE5; --green-text:  #065F46;
  --amber:  #F59E0B; --amber-bg:  #FEF3C7; --amber-text:  #92400E;
  --red:    #EF4444; --red-bg:    #FEE2E2; --red-text:    #991B1B;
  --blue:   #3B82F6; --blue-bg:   #DBEAFE; --blue-text:   #1E40AF;
  --purple:    #8B5CF6; --purple-bg:  #EDE9FE; --purple-text:  #6D28D9;
  --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
  --shadow-lg:  0 8px 32px rgba(0,0,0,0.13);
  --shadow-xl:  0 20px 60px rgba(0,0,0,0.18);
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', sans-serif;
  background: rgba(26,29,46,0.65);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}

/* ━━━━━━━━━━ 팝업 래퍼 ━━━━━━━━━━ */
.popup-wrap {
  width: 820px; max-width: calc(100vw - 40px);
  background: var(--bg-surface);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  overflow: hidden;
  display: flex; flex-direction: column;
  max-height: 90vh;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { opacity:0; transform: scale(0.92) translateY(20px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

/* ━━━━━━━━━━ 헤더 ━━━━━━━━━━ */
.popup-header {
  padding: 24px 28px 0;
  flex-shrink: 0;
}
.popup-header-top {
  display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px;
}
.popup-title-wrap { display: flex; align-items: center; gap: 12px; }
.popup-icon {
  width: 44px; height: 44px; border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent), #7C3AED);
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.popup-title    { font-size: 19px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; }
.popup-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
.popup-close {
  width: 34px; height: 34px; border-radius: var(--radius-md);
  background: var(--bg-base); border: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text-secondary);
  transition: 0.18s; flex-shrink: 0;
}
.popup-close:hover { background: var(--red-bg); color: var(--red-text); border-color: #FCA5A5; }

/* ━━━━━━━━━━ 검색바 ━━━━━━━━━━ */
.search-bar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.search-input-wrap {
  flex: 1; position: relative;
}
.search-input {
  width: 100%; height: 44px;
  background: var(--bg-base); border: 1.5px solid var(--border-light);
  border-radius: var(--radius-md); padding: 0 16px 0 42px;
  font-size: 14px; color: var(--text-primary); font-family: 'Pretendard', sans-serif;
  transition: 0.2s; outline: none;
}
.search-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
.search-input::placeholder { color: var(--text-muted); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }

.filter-row {
  display: flex; gap: 6px; margin-bottom: 4px; flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border-light);
  background: var(--bg-base); color: var(--text-secondary); transition: 0.18s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ━━━━━━━━━━ 결과 카운트 ━━━━━━━━━━ */
.result-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 28px; background: var(--bg-base); border-top: 1px solid var(--border-light);
  flex-shrink: 0;
}
.result-count { font-size: 13px; color: var(--text-secondary); }
.result-count strong { color: var(--text-primary); font-weight: 700; }

/* ━━━━━━━━━━ 카드 그리드 ━━━━━━━━━━ */
.cards-area {
  flex: 1; overflow-y: auto; padding: 16px 28px;
}
.cards-area::-webkit-scrollbar { width: 5px; }
.cards-area::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }

.cards-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
}
@media (max-width: 700px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }

.org-card {
  padding: 14px 16px; border-radius: var(--radius-lg);
  border: 2px solid var(--border-light);
  background: var(--bg-surface); cursor: pointer; transition: all 0.2s;
  position: relative; user-select: none;
}
.org-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.org-card.selected { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(67,97,238,0.15); }
.org-card.selected .org-check { display: flex; }

.org-check {
  display: none; position: absolute; top: 10px; right: 10px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: #fff;
  align-items: center; justify-content: center; font-size: 13px; font-weight: 800;
}

.org-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.org-avatar {
  width: 38px; height: 38px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.org-avatar.daycare { background: #DBEAFE; }
.org-avatar.kinder  { background: #EDE9FE; }

.org-name    { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; line-height: 1.3; }
.org-type-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 1px 7px; border-radius: 10px; font-size: 12px; font-weight: 700;
}

.org-info { display: flex; flex-direction: column; gap: 4px; }
.org-info-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
}
.org-info-row svg { flex-shrink: 0; color: var(--text-muted); }

.org-card-bottom {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-light);
}
.org-stats { display: flex; gap: 12px; }
.org-stat   { text-align: center; }
.org-stat-num { font-size: 15px; font-weight: 800; color: var(--text-primary); }
.org-stat-lbl { font-size: 11px; color: var(--text-muted); }

.org-status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700;
}

/* 빈 상태 */
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--text-muted);
  display: none;
}
.empty-state-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state-text { font-size: 14px; }

/* ━━━━━━━━━━ 검색 버튼 ━━━━━━━━━━ */
.btn-search {
  height: 44px; padding: 0 18px; border-radius: var(--radius-md);
  background: var(--accent); color: #fff; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: 'Pretendard', sans-serif; transition: 0.2s;
  white-space: nowrap; flex-shrink: 0;
}
.btn-search:hover { background: #5371ff; }

/* ━━━━━━━━━━ 페이지네이션 ━━━━━━━━━━ */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 18px 0 4px; flex-wrap: wrap;
}
.page-btn {
  min-width: 34px; height: 34px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border-light); background: var(--bg-surface);
  font-size: 14px; font-weight: 600; color: var(--text-secondary);
  cursor: pointer; font-family: 'Pretendard', sans-serif; transition: 0.18s;
  display: inline-flex; align-items: center; justify-content: center;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ━━━━━━━━━━ 교사 진입 버튼 ━━━━━━━━━━ */
.btn-confirm.btn-teacher {
  background: #14B8A6;
  box-shadow: 0 4px 12px rgba(20,184,166,0.3);
}
.btn-confirm.btn-teacher:hover { background: #0D9488; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(20,184,166,0.35); }
.btn-confirm.btn-teacher:disabled { background: var(--border-medium); box-shadow: none; cursor: not-allowed; transform: none; }

@media (max-width: 700px) {
  .footer-btns { flex-wrap: wrap; }
  .footer-btns .btn { flex: 1; min-width: 120px; }
}

/* ━━━━━━━━━━ 하단 바 ━━━━━━━━━━ */
.popup-footer {
  padding: 16px 28px;
  border-top: 1px solid var(--border-light);
  background: var(--bg-surface);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.selected-preview {
  display: flex; align-items: center; gap: 10px;
  flex: 1;
}
.selected-preview-empty { font-size: 14px; color: var(--text-muted); }
.selected-info { display: flex; align-items: center; gap: 10px; }
.selected-icon {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  background: var(--accent-light); display: flex; align-items: center;
  justify-content: center; font-size: 16px;
}
.selected-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.selected-sub  { font-size: 12px; color: var(--text-secondary); }

.footer-btns { display: flex; gap: 10px; }
.btn {
  height: 42px; padding: 0 22px; border-radius: var(--radius-md);
  font-size: 14px; font-weight: 700; cursor: pointer; border: none;
  font-family: 'Pretendard', sans-serif; transition: all 0.2s;
}
.btn-cancel { background: var(--bg-base); color: var(--text-secondary); border: 1.5px solid var(--border-light); }
.btn-cancel:hover { background: var(--border-light); }
.btn-confirm {
  background: var(--accent); color: #fff; min-width: 120px;
  box-shadow: 0 4px 12px rgba(67,97,238,0.3);
}
.btn-confirm:hover { background: #5371ff; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(67,97,238,0.35); }
.btn-confirm:disabled { background: var(--border-medium); box-shadow: none; cursor: not-allowed; transform: none; }

/* ━━━━━━━━━━ Step 2 교사 선택 ━━━━━━━━━━ */
.teacher-area {
  flex: 1; overflow-y: auto; padding: 0 28px 8px; display: none;
}
.teacher-step-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0 12px; border-bottom: 1px solid var(--border-light); margin-bottom: 16px;
}
.btn-back {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--border-medium);
  border-radius: var(--radius-sm); padding: 6px 12px;
  font-size: 14px; color: var(--text-secondary); cursor: pointer; transition: 0.18s;
  font-family: 'Pretendard', sans-serif;
}
.btn-back:hover { background: var(--bg-base); color: var(--text-primary); }
.teacher-step-org { font-size: 14px; color: var(--text-muted); }
.teacher-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.teacher-card {
  border: 2px solid var(--border-light); border-radius: var(--radius-md);
  padding: 10px 14px; cursor: pointer; transition: 0.18s; background: var(--bg-surface);
  display: flex; align-items: center; gap: 12px;
}
.teacher-card:hover { border-color: var(--accent); }
.teacher-card.selected {
  border-color: var(--accent); background: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
}
.teacher-avatar {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff;
}
.teacher-info { flex: 1; min-width: 0; }
.teacher-name { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
.teacher-meta { display: flex; align-items: center; gap: 6px; }
.teacher-role-badge {
  display: inline-block; font-size: 12px; font-weight: 700;
  padding: 1px 7px; border-radius: 20px; flex-shrink: 0;
}
.badge-main { background: #DBEAFE; color: #1E40AF; }
.badge-sub  { background: #D1FAE5; color: #065F46; }
.badge-etc  { background: #F3F4F6; color: #6B7280; }
.teacher-class { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.footer-step1 { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.footer-step2 { display: none; align-items: center; justify-content: space-between; width: 100%; }
.teacher-preview-wrap { display: flex; align-items: center; gap: 10px; }
.teacher-preview-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.teacher-preview-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.teacher-preview-role { font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="popup-wrap">
  <!-- 헤더 -->
  <div class="popup-header">
    <div class="popup-header-top">
      <div class="popup-title-wrap">
        <div class="popup-icon">🏫</div>
        <div>
          <div class="popup-title">운영관리 — 기관 선택</div>
          <div class="popup-subtitle">접속할 기관을 선택한 후 확인 버튼을 눌러주세요.</div>
        </div>
      </div>
      <div class="popup-close" onclick="closePopup()" title="닫기">✕</div>
    </div>

    <!-- 검색 -->
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput"
          placeholder="기관명 또는 원장 이름으로 검색..."
          onkeydown="if(event.key==='Enter') executeSearch()">
      </div>
      <button class="btn-search" onclick="executeSearch()">검색</button>
    </div>

    <!-- 필터 칩 -->
    <div class="filter-row">
      <span class="filter-chip active" onclick="setFilter('all',this)">전체</span>
      <span class="filter-chip" onclick="setFilter('어린이집',this)">🏠 어린이집</span>
      <span class="filter-chip" onclick="setFilter('유치원',this)">🎒 유치원</span>
      <span class="filter-chip" onclick="setFilter('이용중',this)">🟢 이용중</span>
      <span class="filter-chip" onclick="setFilter('이용종료',this)">🔴 이용종료</span>
    </div>
  </div>

  <!-- 결과 카운트 -->
  <div class="result-bar" id="resultBar">
    <span class="result-count">총 <strong id="resultCount">12</strong>개 기관</span>
    <span style="font-size:13px;color:var(--text-muted)">카드를 클릭해 선택하세요</span>
  </div>

  <!-- 카드 그리드 -->
  <div class="cards-area">
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-text">검색 결과가 없습니다.</div>
    </div>
    <div class="pagination" id="paginationArea"></div>
  </div>

  <!-- Step 2: 교사 선택 패널 -->
  <div class="teacher-area" id="teacherArea">
    <div class="teacher-step-header">
      <button class="btn-back" onclick="showOrgStep()">← 기관 선택으로</button>
      <span class="teacher-step-org" id="teacherStepOrg"></span>
    </div>
    <div class="teacher-grid" id="teacherGrid"></div>
  </div>

  <!-- 하단 푸터 -->
  <div class="popup-footer">
    <!-- Step 1 푸터 -->
    <div class="footer-step1" id="footerStep1">
      <div class="selected-preview" id="selectedPreview">
        <span class="selected-preview-empty">선택된 기관이 없습니다.</span>
      </div>
      <div class="footer-btns">
        <button class="btn btn-cancel" onclick="closePopup()">취소</button>
        <button class="btn btn-confirm btn-org" id="confirmOrgBtn" disabled onclick="confirmAsRole('org_admin')">
          🏫 기관관리자로 접속
        </button>
        <button class="btn btn-confirm btn-teacher" id="confirmTeacherBtn" disabled onclick="showTeacherStep()">
          📚 교사 선택 후 접속
        </button>
      </div>
    </div>
    <!-- Step 2 푸터 -->
    <div class="footer-step2" id="footerStep2">
      <div class="selected-preview" id="teacherPreview">
        <span class="selected-preview-empty">교사를 선택하세요.</span>
      </div>
      <div class="footer-btns">
        <button class="btn btn-cancel" onclick="showOrgStep()">← 뒤로</button>
        <button class="btn btn-confirm btn-teacher" id="confirmTeacherFinalBtn" disabled onclick="confirmTeacher()">
          교사를 선택하세요
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ── 세션 체크 (통합관리자만 접근 가능) ──
(function() {
  const role = sessionStorage.getItem('userRole');
  if (role !== 'super') {
    alert('통합관리자만 접근할 수 있습니다.');
    window.location.href = '../../../index.html';
  }
})();

// ── 목업 기관 데이터 ──
const ORGS = [
  { id:'ORG001', name:'해맑은 어린이집',   type:'어린이집', director:'김수진', phone:'02-1234-5678', address:'서울 마포구 신수동 123',      status:'이용중',  membership:'정회원', cls:5, teacher:8,  kid:84 },
  { id:'ORG002', name:'별빛 유치원',       type:'유치원',  director:'이민준', phone:'031-234-5678', address:'경기 성남시 분당구 서현동 456', status:'이용중',  membership:'멀티회원', cls:7, teacher:12, kid:130 },
  { id:'ORG003', name:'새싹 어린이집',     type:'어린이집', director:'박지영', phone:'02-3456-7890', address:'서울 강남구 역삼동 789',       status:'이용중',  membership:'일반회원', cls:3, teacher:5,  kid:48 },
  { id:'ORG004', name:'하늘 유치원',       type:'유치원',  director:'최현우', phone:'032-456-7890', address:'인천 남동구 구월동 321',       status:'이용중',  membership:'정회원', cls:6, teacher:10, kid:112 },
  { id:'ORG005', name:'햇살 어린이집',     type:'어린이집', director:'정소연', phone:'051-567-8901', address:'부산 해운대구 반여동 654',      status:'이용종료', membership:'일반회원', cls:4, teacher:6,  kid:60 },

let selectedOrg   = null;
let selectedTeacher = null;
let currentFilter = 'all';
let currentSearch = '';
let currentPage   = 1;
const PAGE_SIZE   = 6;

// ── 렌더링 ──
function renderCards() {
  const grid  = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyState');
  const query = currentSearch.toLowerCase();

  const filtered = ORGS.filter(o => {
    const matchFilter =
      currentFilter === 'all' ||
      o.type === currentFilter ||
      o.status === currentFilter;
    const matchSearch =
      !query ||
      o.name.toLowerCase().includes(query) ||
      o.director.toLowerCase().includes(query) ||
      o.address.toLowerCase().includes(query);
    return matchFilter && matchSearch;
  });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  if (currentPage > totalPages) currentPage = totalPages;

  document.getElementById('resultCount').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = ''; empty.style.display = 'block';
    document.getElementById('paginationArea').innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  const pageItems = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  grid.innerHTML = pageItems.map(o => {
    const isSelected = selectedOrg && selectedOrg.id === o.id;
    const isKinder   = o.type === '유치원';
    const statusBg   = o.status === '이용중' ? 'var(--green-bg)' : 'var(--red-bg)';
    const statusTxt  = o.status === '이용중' ? 'var(--green-text)' : 'var(--red-text)';
    const statusDot  = o.status === '이용중' ? 'var(--green)' : 'var(--red)';
    const memberBg   = o.membership === '멀티회원' ? 'var(--purple-bg)' : o.membership === '정회원' ? 'var(--blue-bg)' : 'var(--border-light)';
    const memberTxt  = o.membership === '멀티회원' ? 'var(--purple-text)' : o.membership === '정회원' ? 'var(--blue-text)' : 'var(--text-secondary)';

    return `
      <div class="org-card ${isSelected ? 'selected' : ''}" onclick="selectOrg('${o.id}')">
        <div class="org-check">✓</div>
        <div class="org-card-top">
          <div class="org-avatar ${isKinder ? 'kinder' : 'daycare'}">${isKinder ? '🎒' : '🏠'}</div>
          <div style="min-width:0">
            <div class="org-name">${o.name}</div>
            <span class="org-type-badge" style="background:${memberBg};color:${memberTxt}">
              ${o.membership === '멀티회원' ? '👑' : o.membership === '정회원' ? '⭐' : ''} ${o.membership}
            </span>
          </div>
        </div>
        <div class="org-info">
          <div class="org-info-row">
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            원장 ${o.director}
          </div>
          <div class="org-info-row">
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            ${o.phone}
          </div>
          <div class="org-info-row">
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            ${o.address}
          </div>
        </div>
        <div class="org-card-bottom">
          <div class="org-stats">
            <div class="org-stat"><div class="org-stat-num">${o.cls}</div><div class="org-stat-lbl">반</div></div>
            <div class="org-stat"><div class="org-stat-num">${o.teacher}</div><div class="org-stat-lbl">교사</div></div>
            <div class="org-stat"><div class="org-stat-num">${o.kid}</div><div class="org-stat-lbl">원아</div></div>
          </div>
          <span class="org-status-badge" style="background:${statusBg};color:${statusTxt}">
            <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${statusDot};margin-right:3px"></span>
            ${o.status}
          </span>
        </div>
      </div>
    `;
  }).join('');

  // 페이지네이션 렌더링
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const area = document.getElementById('paginationArea');
  if (totalPages <= 1) { area.innerHTML = ''; return; }
  let html = '';
  html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀</button>`;
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>▶</button>`;
  area.innerHTML = html;
}

function goToPage(n) {
  currentPage = n;
  renderCards();
  document.querySelector('.cards-area').scrollTop = 0;
}

// ── 기관 선택 ──
function selectOrg(id) {
  selectedOrg = ORGS.find(o => o.id === id);
  selectedTeacher = null;
  renderCards();
  updateFooter();
}

function updateFooter() {
  const preview    = document.getElementById('selectedPreview');
  const orgBtn     = document.getElementById('confirmOrgBtn');
  const teacherBtn = document.getElementById('confirmTeacherBtn');
  if (selectedOrg) {
    preview.innerHTML = `
      <div class="selected-info">
        <div class="selected-icon">${selectedOrg.type === '유치원' ? '🎒' : '🏠'}</div>
        <div>
          <div class="selected-name">${selectedOrg.name}</div>
          <div class="selected-sub">원장: ${selectedOrg.director} · ${selectedOrg.address}</div>
        </div>
      </div>
    `;
    orgBtn.disabled = false;
    teacherBtn.disabled = false;
  } else {
    preview.innerHTML = '<span class="selected-preview-empty">선택된 기관이 없습니다.</span>';
    orgBtn.disabled = true;
    teacherBtn.disabled = true;
  }
}

// ── 검색 (버튼/Enter) ──
function executeSearch() {
  currentSearch = document.getElementById('searchInput').value;
  currentPage = 1;
  renderCards();
}

// ── 필터 칩 ──
function setFilter(val, el) {
  currentFilter = val;
  currentPage = 1;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

// ── 기관의 모든 반 목록 생성 (모킹) ──
function getAllClassesForOrg(org) {
  const names  = ['햇님반','달님반','별빛반','구름반','무지개반','새싹반','꽃잎반','하늘반','바다반'];
  const ages   = ['만0세','만1세','만2세','만3세','만4세','만5세'];
  const counts = [18, 16, 20, 15, 22, 14, 19, 17, 21];
  const result = [];
  for (let i = 0; i < (org.cls || 3); i++) {
    result.push({
      id: 'CLS' + String(i + 1).padStart(3, '0'),
      name: names[i] || (i + 1) + '반',
      age: ages[i % ages.length],
      studentCount: counts[i % counts.length]
    });
  }
  return result;
}

// ── 기관 소속 교사 목록 생성 (모킹) ──
function getTeachersForOrg(org) {
  const classes = getAllClassesForOrg(org);
  const names  = ['이하늘','박민지','최서연','강지수','정다온','김보라','오민준','서지아','한채린','임하늘','조현아','배성준','정소연','최현우','이민준','윤성호'];
  const colors = ['#4361EE','#10B981','#F59E0B','#EF4444','#8B5CF6','#0EA5E9','#14B8A6','#EC4899','#6366F1','#84CC16','#F97316','#06B6D4'];
  const count  = Math.min(org.teacher, names.length);

  // ── 고정 케이스 (앞 4명) ──────────────────────────────────────
  // Case A: 반 1개 담임 (이하늘)
  // Case B: 반 2개 담임+보조 겸임 (박민지)
  // Case C: 반 3개 이상 접근 (최서연) — classes[0..2]
  // Case D: 담당 반 없는 기타 교사 (강지수)
  const fixedCases = [
    { role: '담임', assignedClasses: classes.slice(0, 1) },                              // A: 1개
    { role: '담임', assignedClasses: classes.slice(0, Math.min(2, classes.length)) },    // B: 2개
    { role: '담임', assignedClasses: classes.slice(0, Math.min(3, classes.length)) },    // C: 3개
    { role: '기타', assignedClasses: [] },                                                // D: 없음
  ];

  const result = [];
  for (let i = 0; i < count; i++) {
    if (i < fixedCases.length) {
      result.push({
        id:              `T${String(i + 1).padStart(3, '0')}`,
        name:            names[i],
        role:            fixedCases[i].role,
        color:           colors[i % colors.length],
        assignedClasses: fixedCases[i].assignedClasses,
      });
    } else {
      const isMain = i < org.cls;
      const isSub  = !isMain && i < org.cls * 2;
      result.push({
        id:             `T${String(i + 1).padStart(3, '0')}`,
        name:           names[i],
        role:           isMain ? '담임' : isSub ? '보조' : '기타',
        color:          colors[i % colors.length],
        assignedClasses: isMain ? [classes[i]] : (isSub && classes[i - org.cls] ? [classes[i - org.cls]] : [])
      });
    }
  }
  return result;
}

// ── 확인 (역할 선택) ──
function confirmAsRole(contextRole) {
  if (!selectedOrg) return;
  const context = {
    orgId:          selectedOrg.id,
    orgName:        selectedOrg.name,
    orgType:        selectedOrg.type,
    director:       selectedOrg.director,
    phone:          selectedOrg.phone,
    address:        selectedOrg.address,
    enteredAt:      new Date().toISOString(),
    contextRole:    contextRole,
    allClassAccess: false
  };
  sessionStorage.setItem('operationContext', JSON.stringify(context));

  sessionStorage.removeItem('assignedClasses');
  // userRole은 'super' 유지
  window.location.href = './operation-dashboard.html';
}

// ── Step 2: 교사 선택 화면으로 전환 ──
function showTeacherStep() {
  if (!selectedOrg) return;
  document.querySelector('.popup-icon').textContent     = '👩‍🏫';
  document.querySelector('.popup-title').textContent    = '교사 선택';
  document.querySelector('.popup-subtitle').textContent = `${selectedOrg.name} 소속 교사를 선택하세요.`;
  document.querySelector('.search-bar').style.display  = 'none';
  document.querySelector('.filter-row').style.display  = 'none';
  document.getElementById('resultBar').style.display   = 'none';
  document.querySelector('.cards-area').style.display  = 'none';
  document.getElementById('teacherArea').style.display = 'block';
  document.getElementById('teacherStepOrg').textContent = `— ${selectedOrg.name}`;
  document.getElementById('footerStep1').style.display = 'none';
  document.getElementById('footerStep2').style.display = 'flex';
  selectedTeacher = null;
  renderTeacherGrid();
  updateTeacherFooter();
}

// ── Step 1: 기관 선택 화면으로 복귀 ──
function showOrgStep() {
  document.querySelector('.popup-icon').textContent     = '🏫';
  document.querySelector('.popup-title').textContent    = '운영관리 — 기관 선택';
  document.querySelector('.popup-subtitle').textContent = '접속할 기관을 선택한 후 확인 버튼을 눌러주세요.';
  document.querySelector('.search-bar').style.display  = '';
  document.querySelector('.filter-row').style.display  = '';
  document.getElementById('resultBar').style.display   = '';
  document.querySelector('.cards-area').style.display  = '';
  document.getElementById('teacherArea').style.display = 'none';
  document.getElementById('footerStep1').style.display = 'flex';
  document.getElementById('footerStep2').style.display = 'none';
  selectedTeacher = null;
}

// ── 교사 카드 그리드 렌더링 ──
function renderTeacherGrid() {
  window._currentOrgTeachers = getTeachersForOrg(selectedOrg);
  const grid = document.getElementById('teacherGrid');
  if (window._currentOrgTeachers.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-muted);font-size:14px;">등록된 교사가 없습니다.</div>';
    return;
  }
  grid.innerHTML = window._currentOrgTeachers.map(t => {
    const badgeClass = t.role === '담임' ? 'badge-main' : t.role === '보조' ? 'badge-sub' : 'badge-etc';
    const classLabel = t.assignedClasses.length > 0 ? t.assignedClasses.map(c => c.name).join(', ') : '담당 반 없음';
    const isSelected = selectedTeacher && selectedTeacher.id === t.id;
    return `
      <div class="teacher-card ${isSelected ? 'selected' : ''}" onclick="selectTeacher('${t.id}')">
        <div class="teacher-avatar" style="background:${t.color}">${t.name.charAt(0)}</div>
        <div class="teacher-info">
          <div class="teacher-name">${t.name}</div>
          <div class="teacher-meta">
            <span class="teacher-role-badge ${badgeClass}">${t.role}</span>
            <span class="teacher-class">📚 ${classLabel}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── 교사 카드 선택 ──
function selectTeacher(id) {
  selectedTeacher = (window._currentOrgTeachers || []).find(t => t.id === id) || null;
  renderTeacherGrid();
  updateTeacherFooter();
}

// ── 교사 선택 후 푸터 프리뷰 업데이트 ──
function updateTeacherFooter() {
  const preview = document.getElementById('teacherPreview');
  const btn     = document.getElementById('confirmTeacherFinalBtn');
  if (selectedTeacher) {
    const classLabel = selectedTeacher.assignedClasses.length > 0
      ? selectedTeacher.assignedClasses.map(c => c.name).join(', ')
      : '담당 반 없음';
    preview.innerHTML = `
      <div class="teacher-preview-wrap">
        <div class="teacher-preview-avatar" style="background:${selectedTeacher.color}">${selectedTeacher.name.charAt(0)}</div>
        <div>
          <div class="teacher-preview-name">${selectedTeacher.name}</div>
          <div class="teacher-preview-role">${selectedTeacher.role} · ${classLabel}</div>
        </div>
      </div>`;
    btn.disabled    = false;
    btn.textContent = `${selectedTeacher.name} 교사 권한으로 접속`;
  } else {
    preview.innerHTML = '<span class="selected-preview-empty">교사를 선택하세요.</span>';
    btn.disabled    = true;
    btn.textContent = '교사를 선택하세요';
  }
}

// ── 교사 선택 확인 ──
function confirmTeacher() {
  if (!selectedOrg || !selectedTeacher) return;
  const classLabel = selectedTeacher.assignedClasses.map(c => c.name).join(', ');
  const context = {
    orgId:             selectedOrg.id,
    orgName:           selectedOrg.name,
    orgType:           selectedOrg.type,
    director:          selectedOrg.director,
    phone:             selectedOrg.phone,
    address:           selectedOrg.address,
    enteredAt:         new Date().toISOString(),
    contextRole:       'teacher',
    allClassAccess:    false,
    proxyTeacherName:  selectedTeacher.name,
    proxyTeacherRole:  selectedTeacher.role,
    proxyTeacherClass: classLabel
  };
  sessionStorage.setItem('operationContext', JSON.stringify(context));
  sessionStorage.setItem('assignedClasses', JSON.stringify(selectedTeacher.assignedClasses));
  window.location.href = './operation-dashboard.html';
}

// ── 닫기 ──
function closePopup() {
  // 이전 페이지(대시보드)로 복귀
  if (document.referrer) {
    history.back();
  } else {
    window.location.href = 'dashboard.html';
  }
}

// ── ESC 키 닫기 ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePopup();
});

// ── 배경(overlay) 클릭 닫기 ──
document.body.addEventListener('click', e => {
  if (e.target === document.body) closePopup();
});

// ── 초기 렌더링 ──
renderCards();
</script>
