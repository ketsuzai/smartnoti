<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 — 키드키즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="operation-sidebar.js" defer></script>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<script>
if (new URLSearchParams(window.location.search).get('modal') === 'att') {
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      if (typeof openClassAttendanceModal === 'function') {
        openClassAttendanceModal('CLS001', '햇님반');
      }
    }, 2000);
  });
}
</script>
<style>
:root {
  --sidebar-bg:      #0C2D48;
  --sidebar-hover:   #1A4A6B;
  --sidebar-active:  #1E5580;
  --sidebar-text:    #B8D9F0;
  --sidebar-width:   240px;
  --header-height:   60px;
  --accent:          #0EA5E9;
  --accent-light:    #E0F2FE;
  --accent-dark:     #0284C7;
  --bg-base:         #F0F7FF;
  --bg-surface:      #FFFFFF;
  --text-primary:    #0C2D48;
  --text-secondary:  #4B7FA3;
  --text-muted:      #94B8D0;
  --border-light:    #DBEAFE;
  --border-medium:   #BAD9F7;
  --green:  #10B981; --green-bg:  #D1FAE5; --green-text:  #065F46;
  --blue:   #3B82F6; --blue-bg:   #DBEAFE; --blue-text:   #1E40AF;
  --amber:  #F59E0B; --amber-bg:  #FEF3C7; --amber-text:  #92400E;
  --red:    #EF4444; --red-bg:    #FEE2E2; --red-text:    #991B1B;
  --purple: #8B5CF6; --purple-bg: #EDE9FE; --purple-text: #5B21B6;
  --shadow-sm: 0 1px 3px rgba(12,45,72,0.06);
  --shadow-md: 0 4px 12px rgba(12,45,72,0.09);
  --shadow-lg: 0 8px 28px rgba(12,45,72,0.11);
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg-base); color: var(--text-primary); display: flex; height: 100vh; overflow: hidden; }

/* 사이드바 CSS → operation-sidebar.js 에서 주입 */

/* ━━━ MAIN ━━━ */
.main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ━━━ TOPBAR ━━━ */
.topbar {
  height: var(--header-height); background: var(--bg-surface);
  border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; padding: 0 24px; gap: 12px;
  box-shadow: var(--shadow-sm); flex-shrink: 0; z-index: 50;
}
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); flex: 1; }
.breadcrumb .cur { color: var(--text-primary); font-weight: 600; }
.bc-sep { color: var(--text-muted); font-size: 11px; }

/* ━━━━━━━━━━ 반 필터 셀렉터 ━━━━━━━━━━ */
.class-filter-wrap {
  width: fit-content;
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-base); border: 1.5px solid var(--border-light);
  border-radius: var(--radius-md); padding: 5px 12px; transition: 0.18s;
}
.class-filter-wrap:focus-within { border-color: var(--accent); background: #fff; }
.class-filter-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; }
.class-filter-divider { width: 1px; height: 14px; background: var(--border-medium); }

/* 커스텀 셀렉트 래퍼 */
.class-select-wrap { position: relative; }
.class-select {
  appearance: none; -webkit-appearance: none;
  border: none; background: transparent;
  font-size: 13px; font-weight: 700; color: var(--text-primary);
  cursor: pointer; font-family: 'Pretendard', sans-serif;
  outline: none; padding-right: 20px; min-width: 120px;
}
.class-select-arrow {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--text-muted); font-size: 11px;
}

/* 비활성(교사 비담당) 옵션 스타일 */
.class-select option.disabled-opt {
  color: #C0C0C0;
  background: #F9FAFB;
}

.class-filter-bar { margin-bottom: 14px; }

.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-date  { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-base); border: 1px solid var(--border-light);
  cursor: pointer; transition: 0.18s; font-size: 16px; position: relative;
}
.icon-btn:hover { background: var(--accent-light); border-color: var(--accent); }
.notif-dot::after {
  content: ''; position: absolute; top: 6px; right: 6px;
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  border: 1.5px solid var(--bg-surface);
}

/* ━━━ CONTENT ━━━ */
.content { flex: 1; overflow-y: auto; padding: 22px 24px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }

/* 페이지 헤더 */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.page-title  { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
.page-sub    { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
.date-chip   { display: flex; align-items: center; gap: 6px; background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 6px 14px; font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }

/* ━━━ 교사 담당 반 히어로 (교사 전용, 단일 반 고정일 때) ━━━ */
.class-hero {
  background: linear-gradient(135deg, #0C2D48 0%, #1E5580 100%);
  border-radius: var(--radius-xl); padding: 18px 22px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; color: #fff; box-shadow: var(--shadow-md);
  display: none; /* JS로 조건 표시 */
}
.class-hero.show { display: flex; }
.hero-left { display: flex; align-items: center; gap: 14px; }
.hero-icon { width: 52px; height: 52px; border-radius: var(--radius-lg); background: rgba(255,255,255,0.12); display:flex;align-items:center;justify-content:center; font-size: 26px; }
.hero-class-name { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 3px; }
.hero-class-info { font-size: 12px; color: rgba(255,255,255,0.65); display: flex; gap: 12px; }
.hero-stats { display: flex; gap: 20px; }
.hero-stat { text-align: center; }
.hero-stat-num { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.hero-stat-lbl { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 3px; }

/* ━━━ KPI GRID ━━━ */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
.kpi-card {
  background: var(--bg-surface); border-radius: var(--radius-lg);
  padding: 16px 18px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
  display: flex; align-items: center; gap: 12px; transition: box-shadow 0.2s;
}
.kpi-card:hover { box-shadow: var(--shadow-md); }
.kpi-ico { width: 46px; height: 46px; border-radius: var(--radius-md); display:flex;align-items:center;justify-content:center; font-size: 21px; flex-shrink: 0; }
.kpi-ico.sky    { background: #E0F2FE; }
.kpi-ico.teal   { background: #CCFBF1; }
.kpi-ico.green  { background: var(--green-bg); }
.kpi-ico.amber  { background: var(--amber-bg); }
.kpi-ico.purple { background: var(--purple-bg); }
.kpi-ico.red    { background: var(--red-bg); }
.kpi-info  { flex: 1; min-width: 0; }
.kpi-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 2px; }
.kpi-value { font-size: 24px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.8px; line-height: 1; }
.kpi-sub   { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.kpi-trend { font-size: 12px; font-weight: 600; margin-top: 3px; }
.kpi-trend.up   { color: var(--green); }
.kpi-trend.down { color: var(--red); }

/* ━━━ 레이아웃 ━━━ */
.grid-3col { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

.card { background: var(--bg-surface); border-radius: var(--radius-lg); border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); overflow: hidden; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border-light); }
.card-title  { font-size: 13.5px; font-weight: 700; color: var(--text-primary); display:flex;align-items:center;gap:6px; }
.card-action { font-size: 12px; color: var(--accent-dark); font-weight: 600; cursor: pointer; }
.card-action:hover { text-decoration: underline; }
.card-body   { padding: 14px 18px; }

/* ━━━ 반 현황 카드 그리드 ━━━ */
#mainCardBody { scrollbar-width: thin; scrollbar-color: var(--border-medium) transparent; }
#mainCardBody::-webkit-scrollbar { width: 4px; }
#mainCardBody::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }
#mainCardBody::-webkit-scrollbar-track { background: transparent; }
.class-cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
.cls-card {
  padding: 12px 14px; border-radius: var(--radius-md);
  background: var(--bg-surface); border: 1px solid var(--border-light);
  cursor: pointer;
  transition: border-color 0.18s ease, box-shadow 0.2s ease, transform 0.15s ease;
}
.cls-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
/* 교사 비담당 반 스타일 */
.cls-card.non-assigned {
  opacity: 0.45; cursor: default; pointer-events: none;
  background: #F9FAFB; border-color: #E5E7EB;
}
.cls-card.non-assigned .cls-name { color: #9CA3AF; }
.non-assigned-mark {
  font-size: 9px; font-weight: 700; color: #9CA3AF;
  background: #F3F4F6; border: 1px solid #E5E7EB;
  padding: 1px 6px; border-radius: 10px; margin-left: 4px;
}
.cls-name    { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; display: flex; align-items: center; }
.cls-teacher { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; }
.cls-stats   { display: flex; justify-content: space-between; }
.cls-stat    { text-align: center; }
.cls-stat-n  { font-size: 17px; font-weight: 800; color: var(--accent-dark); }
.cls-stat-l  { font-size: 9px; color: var(--text-muted); }
.cls-bar     { margin-top: 7px; background: var(--border-light); border-radius: 4px; height: 3px; }
.cls-bar-fill{ height: 3px; border-radius: 4px; background: var(--accent); }

/* ━━━ 할 일 ━━━ */
.todo-list { display: flex; flex-direction: column; gap: 7px; }
.todo-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-md); background: var(--bg-base); border: 1px solid var(--border-light); cursor: pointer; transition: 0.18s; }
.todo-item:hover { border-color: var(--accent); background: var(--accent-light); }
.todo-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.todo-text { flex: 1; font-size: 12.5px; font-weight: 500; }
.todo-cnt  { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }

/* ━━━ 활동 내역 ━━━ */
.act-list { display: flex; flex-direction: column; }
.act-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border-light); }
.act-item:last-child { border-bottom: none; }
.act-avatar { width: 30px; height: 30px; border-radius: 50%; display:flex;align-items:center;justify-content:center; font-size:11px;font-weight:700;color:#fff;flex-shrink:0; }
.act-text   { font-size: 12px; color: var(--text-primary); flex: 1; line-height: 1.5; }
.act-text strong { font-weight: 700; }
.act-time   { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; margin-top: 2px; }

/* ━━━ 공지 ━━━ */
.notice-list { display: flex; flex-direction: column; }
.notice-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border-light); cursor: pointer; }
.notice-item:last-child { border-bottom: none; }
.notice-item:hover .notice-title { color: var(--accent-dark); }
.notice-tag   { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
.notice-title { font-size: 12.5px; color: var(--text-primary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notice-date  { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }

/* ━━━ 차트 ━━━ */
.chart-wrap { position: relative; }
.chart-tabs { display: flex; gap: 4px; }
.chart-tab  { padding: 4px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-light); color: var(--text-secondary); background: var(--bg-base); transition: 0.18s; }
.chart-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ━━━ 교사용 원아 테이블 ━━━ */
.child-table { width: 100%; border-collapse: collapse; }
.child-table th { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--border-light); background: var(--bg-base); }
.child-table td { font-size: 14px; padding: 7px 8px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
.child-table tr:last-child td { border-bottom: none; }
.child-table tr:hover td { background: var(--bg-base); }
.sbadge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 12px; font-weight: 700; }
.sdot   { width: 5px; height: 5px; border-radius: 50%; }

/* ━━━ 출석 카드 ━━━ */
.att-row { display: flex; gap: 7px; margin-bottom: 12px; }
.att-card { flex: 1; padding: 10px; border-radius: var(--radius-md); text-align: center; border: 1px solid var(--border-light); }
.att-num  { font-size: 20px; font-weight: 800; line-height: 1; }
.att-lbl  { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

/* ━━━ 출석현황 전체 모달 ━━━ */
.att-overlay {
  position: fixed; inset: 0; background: rgba(12,45,72,0.55);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.att-overlay.show { opacity: 1; pointer-events: auto; }
.att-modal-box {
  background: var(--bg-surface); border-radius: var(--radius-xl);
  width: min(900px, 90vw); max-height: 88vh;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 60px rgba(12,45,72,0.22);
  transform: translateY(12px); transition: transform 0.22s;
}
.att-overlay.show .att-modal-box { transform: translateY(0); }
.att-modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.att-modal-title { font-size: 16px; font-weight: 800; color: var(--text-primary); }
.att-modal-title span { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-left: 8px; }
.att-modal-close {
  width: 32px; height: 32px; border-radius: var(--radius-md);
  background: var(--bg-base); border: 1px solid var(--border-light);
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: 0.15s;
}
.att-modal-close:hover { background: var(--red-bg); color: var(--red-text); }
.att-modal-summary {
  display: flex; gap: 10px; padding: 14px 22px;
  border-bottom: 1px solid var(--border-light); flex-shrink: 0;
}
.att-modal-stat {
  flex: 1; padding: 10px 14px; border-radius: var(--radius-md);
  border: 1px solid var(--border-light); text-align: center;
}
.att-modal-stat-num { font-size: 22px; font-weight: 800; line-height: 1; }
.att-modal-stat-lbl { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }
.att-modal-filter {
  display: flex; gap: 6px; padding: 10px 22px;
  border-bottom: 1px solid var(--border-light); flex-shrink: 0;
}
.att-filter-btn {
  padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border-light); background: var(--bg-base);
  color: var(--text-secondary); cursor: pointer; transition: 0.15s;
}
.att-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.att-modal-body { flex: 1; overflow-y: auto; padding: 0 22px 16px; }
.att-modal-body::-webkit-scrollbar { width: 4px; }
.att-modal-body::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }
.att-full-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.att-full-table th {
  font-size: 11px; font-weight: 700; color: var(--text-secondary);
  text-align: left; padding: 10px 10px 6px;
  border-bottom: 2px solid var(--border-light);
  position: sticky; top: 0; background: var(--bg-surface); z-index: 1;
}
.att-full-table td {
  font-size: 13px; padding: 9px 10px;
  border-bottom: 1px solid var(--border-light); vertical-align: middle;
}
.att-full-table tr:last-child td { border-bottom: none; }
.att-full-table tr:hover td { background: var(--bg-base); }
.att-full-table td.cell-link {
  cursor: pointer; position: relative;
}
.att-full-table td.cell-link:hover .sbadge,
.att-full-table td.cell-link:hover span { filter: brightness(0.92); }
.att-full-table td.cell-link::after {
  content: '↗'; font-size: 9px; color: var(--accent); margin-left: 4px;
  opacity: 0; transition: opacity 0.15s;
}
.att-full-table td.cell-link:hover::after { opacity: 1; }
.att-modal-hint {
  text-align: center; font-size: 11px; color: var(--text-muted);
  padding: 10px 0 4px; flex-shrink: 0; border-top: 1px solid var(--border-light); margin-top: 4px;
}

/* ━━━ 최근활동 모달 ━━━ */
.act-overlay {
  position: fixed; inset: 0; background: rgba(12,45,72,0.55);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.act-overlay.show { opacity: 1; pointer-events: auto; }
.act-modal-box {
  background: var(--bg-surface); border-radius: var(--radius-xl);
  width: min(680px, 90vw); height: min(640px, 86vh);
  display: flex; flex-direction: column;
  box-shadow: 0 24px 60px rgba(12,45,72,0.22);
  transform: translateY(12px); transition: transform 0.22s;
}
.act-overlay.show .act-modal-box { transform: translateY(0); }
.act-modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--border-light); flex-shrink: 0;
}
.act-modal-title { font-size: 16px; font-weight: 800; color: var(--text-primary); }
.act-modal-title span { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-left: 8px; }
.act-modal-close {
  width: 32px; height: 32px; border-radius: var(--radius-md);
  background: var(--bg-base); border: 1px solid var(--border-light);
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: 0.15s;
}
.act-modal-close:hover { background: var(--red-bg); color: var(--red-text); }
.act-modal-body { flex: 1; overflow-y: auto; }
.act-modal-body::-webkit-scrollbar { width: 4px; }
.act-modal-body::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }
.act-date-group {
  padding: 8px 22px 5px; font-size: 11px; font-weight: 700;
  color: var(--text-secondary); background: var(--bg-base);
  border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 1;
}
.act-modal-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 22px; border-bottom: 1px solid var(--border-light);
  cursor: pointer; transition: background 0.15s;
}
.act-modal-item:hover { background: var(--accent-light); }
.act-modal-arrow { font-size: 11px; color: var(--accent); opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
.act-modal-item:hover .act-modal-arrow { opacity: 1; }

  if (isTeacher) {
    const cur = sessionStorage.getItem('currentClass') || (assignedClasses ? assignedClasses[0] : 'CLS001');
    return CHILDREN_DATA[cur] || CHILDREN_CLS001;
  }
  // 기관관리자: 반 선택 시 해당 반 원아, 전체 선택 시 CLS001 기준

}

const userName      = sessionStorage.getItem('userName')  || '관리자';
const opCtx         = JSON.parse(sessionStorage.getItem('operationContext') || 'null');
const effectiveRole = (opCtx && opCtx.contextRole) ? opCtx.contextRole : userRole;

// - super + opCtx(contextRole:'teacher')  → 교사관리자 뷰
// - super + opCtx(contextRole:'org_admin') → 기관관리자 뷰
// - org_admin → 기관관리자
// - teacher   → 교사관리자
const isSuper   = userRole === 'super';
const isTeacher = effectiveRole === 'teacher';
const isOrgMode = isSuper && opCtx; // 통합관리자 운영관리 컨텍스트

const orgName   = opCtx ? opCtx.orgName : '해맑은 어린이집';

  ? JSON.parse(assignedRaw)
  : (isTeacher ? TEACHER_ASSIGNED : null); // null = 전체 접근

  if (isTeacher) {
    // 교사: 담당 반 1개면 필터 숨김
    const isSingleClass = assignedClasses && assignedClasses.length === 1;
    if (isSingleClass) {
      document.querySelector('.class-filter-bar').style.display = 'none';
      sessionStorage.setItem('currentClass', assignedClasses[0]);
      return;
    }

    // 담당 반 2개 이상: 담당 반만 선택 가능, 이모지 없는 이름 표시
    let html = '';
    ALL_CLASSES.forEach(cls => {
      const isAssigned = assignedClasses && assignedClasses.includes(cls.id);
      if (isAssigned) {
        html += `<option value="${cls.id}">${cls.plain} (${cls.age})</option>`;
      } else {
        html += `<option value="${cls.id}" disabled class="disabled-opt" style="color:#C0C0C0">${cls.plain} (${cls.age}) — 비담당</option>`;
      }
    });
    sel.innerHTML = html;

    // 첫 번째 담당 반 자동 선택
    if (assignedClasses && assignedClasses.length > 0) {
      sel.value = assignedClasses[0];
    }

  } else {
    // 기관관리자 / 통합관리자 운영모드: 전체 반 + 전체 선택 옵션
    let html = '<option value="all">전체 반</option>';
    ALL_CLASSES.forEach(cls => {
      html += `<option value="${cls.id}">${cls.name} (${cls.age})</option>`;
    });
    sel.innerHTML = html;
  }

  onClassChange(sel);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 반 변경 이벤트
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function onClassChange(sel) {
  const val = sel.value;
  sessionStorage.setItem('currentClass', val);

  if (isTeacher) {
    // 교사: 선택된 담당 반 기준으로 히어로 카드 업데이트
    const cls = ALL_CLASSES.find(c => c.id === val);
    if (cls) updateTeacherHero(cls);
    document.getElementById('classHero').classList.add('show');
    updateNoticeStats(cls ? cls.notice : 14, cls ? cls.students - cls.notice : 4);
  } else {
    document.getElementById('classHero').classList.remove('show');
    if (val === 'all') {
      const allCh = ALL_CLASSES.flatMap(cls => CHILDREN_DATA[cls.id] || []);
      updateNoticeStats(allCh.filter(c=>c.noticeWritten).length, allCh.filter(c=>!c.noticeWritten).length);
    } else {
      const ch = CHILDREN_DATA[val] || [];
      updateNoticeStats(ch.filter(c=>c.noticeWritten).length, ch.filter(c=>!c.noticeWritten).length);
    }
  }
  renderMainCard();
}

function updateTeacherHero(cls) {
  const ch = CHILDREN_DATA[cls.id] || [];
  const attend = ch.filter(c => c.attend === '출석').length;
  const notice = ch.filter(c => c.noticeWritten).length;
  document.getElementById('heroIcon').textContent      = cls.icon;
  document.getElementById('heroClassName').textContent = `${cls.plain} (${cls.age})`;
  document.getElementById('heroTotal').textContent     = ch.length;
  document.getElementById('heroAttend').textContent    = attend;
  document.getElementById('heroNotice').textContent    = notice;
  document.getElementById('heroMissing').textContent   = ch.length - notice;
}

function updateNoticeStats(written, missing) {
  const total = written + missing;
  document.getElementById('noticeWritten').textContent = written;
  document.getElementById('noticeMissing').textContent = missing;
  document.getElementById('noticeRate').textContent    = Math.round(written/total*100) + '%';
  if (window._noticeChart) {
    window._noticeChart.data.datasets[0].data = [written, missing];
    window._noticeChart.update();
  }
}

function toggleActivityMore() { openActivityModal(); }

function openActivityModal() {
  const body = document.getElementById('actModalBody');
  // dateLabel 순서 유지하며 그룹핑
  const groups = [];
  const groupMap = {};
  ALL_ACTIVITIES.forEach(a => {

      groupMap[a.dateLabel] = [];
      groups.push({ label: a.dateLabel, items: groupMap[a.dateLabel] });

  body.innerHTML = groups.map(g => `
    <div class="act-date-group">📅 ${g.label}</div>
    ${g.items.map(a => `
      <div class="act-modal-item" onclick="actGo('${a.href}')">

          <div style="font-size:10px;color:var(--text-muted);margin-top:1px">${a.role}</div>
        </div>
        <div style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-right:6px">${a.time}</div>
        <div class="act-modal-arrow">↗</div>
      </div>
    `).join('')}
  `).join('');

  document.getElementById('actOverlay').classList.add('show');
}

function closeActivityModal() {
  document.getElementById('actOverlay').classList.remove('show');
}

function overlayCloseAct(e) {
  if (e.target === document.getElementById('actOverlay')) closeActivityModal();
}

function actGo(href) {
  if (!href) return;
  if (UNBUILT_PAGES.has(href)) { showToast('준비 중인 기능입니다.'); return; }
  location.href = href;
}

    document.getElementById('noticeDonut').getContext('2d'), {
      type: 'doughnut',
      data: { labels:['완료','미작성'], datasets:[{ data:[56,28], backgroundColor:['#0EA5E9','#FEE2E2'], borderWidth:0, hoverOffset:4 }] },
      options: { responsive:true, maintainAspectRatio:false, cutout:'72%',
        plugins:{ legend:{ position:'bottom', labels:{ font:{family:'Pretendard',size:11}, padding:8, boxWidth:8 } } }
      }
    }
  );
}


// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 출석현황 전체 모달
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let attCurrentFilter = 'all';
let _modalOverrideClass = null; // 반별 현황에서 특정 반 클릭 시 사용

function getCurrentChildrenForModal() {
  if (_modalOverrideClass) return CHILDREN_DATA[_modalOverrideClass] || CHILDREN_CLS001;
  return getCurrentChildren();
}

function openClassAttendanceModal(clsId, clsName) {
  _modalOverrideClass = clsId;
  document.getElementById('attModalSub').textContent = `${clsName} · 오늘`;
  openAttendanceModal();
}

function attendBadge(status) {
  const cfg = {
    '출석': { bg:'var(--green-bg)', color:'var(--green-text)', dot:'var(--green)' },
    '결석': { bg:'var(--red-bg)',   color:'var(--red-text)',   dot:'var(--red)'   },
    '조퇴': { bg:'var(--amber-bg)', color:'var(--amber-text)', dot:'var(--amber)' },
    '외출': { bg:'var(--blue-bg)',  color:'var(--blue-text)',  dot:'var(--blue)'  },
  };
  const c = cfg[status] || cfg['출석'];
  return `<span class="sbadge" style="background:${c.bg};color:${c.color}"><span class="sdot" style="background:${c.dot}"></span>${status}</span>`;
}

function openAttendanceModal() {
  attCurrentFilter = 'all';
  document.querySelectorAll('.att-filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.att-filter-btn').classList.add('active');

  const children = getCurrentChildrenForModal();
  // 요약 카드
  const cnt = s => children.filter(c => c.attend === s).length;
  document.getElementById('attModalSummary').innerHTML = `
    <div class="att-modal-stat" style="background:var(--green-bg);border-color:#A7F3D0">
      <div class="att-modal-stat-num" style="color:var(--green-text)">${cnt('출석')}</div>
      <div class="att-modal-stat-lbl">출석</div>
    </div>
    <div class="att-modal-stat" style="background:var(--red-bg);border-color:#FCA5A5">
      <div class="att-modal-stat-num" style="color:var(--red-text)">${cnt('결석')}</div>
      <div class="att-modal-stat-lbl">결석</div>
    </div>
    <div class="att-modal-stat" style="background:var(--amber-bg);border-color:#FDE68A">
      <div class="att-modal-stat-num" style="color:var(--amber-text)">${cnt('조퇴')}</div>
      <div class="att-modal-stat-lbl">조퇴</div>
    </div>
    <div class="att-modal-stat" style="background:var(--blue-bg);border-color:#BAD9F7">
      <div class="att-modal-stat-num" style="color:var(--blue-text)">${cnt('외출')}</div>
      <div class="att-modal-stat-lbl">외출</div>
    </div>
    <div class="att-modal-stat" style="background:var(--amber-bg);border-color:#FDE68A">
      <div class="att-modal-stat-num" style="color:var(--amber-text)">${children.filter(c=>c.medicine).length}</div>
      <div class="att-modal-stat-lbl">투약 예정</div>
    </div>
    <div class="att-modal-stat" style="background:var(--red-bg);border-color:#FCA5A5">
      <div class="att-modal-stat-num" style="color:var(--red-text)">${children.filter(c=>!c.noticeWritten).length}</div>
      <div class="att-modal-stat-lbl">알림장 미작성</div>
    </div>
  `;

  renderAttTable('all');
  // 모달 서브타이틀: override가 없을 때만 기본값 세팅
  if (!_modalOverrideClass) {
    const cur = sessionStorage.getItem('currentClass') || (assignedClasses ? assignedClasses[0] : 'CLS001');
    const cls = ALL_CLASSES.find(c => c.id === cur);
    document.getElementById('attModalSub').textContent = cls ? `${cls.plain} · 오늘` : '오늘';
  }
  document.getElementById('attOverlay').classList.add('show');
}

function closeAttendanceModal() {
  document.getElementById('attOverlay').classList.remove('show');
  _modalOverrideClass = null;
}

function overlayClose(e) {
  if (e.target === document.getElementById('attOverlay')) closeAttendanceModal();
}

function filterAtt(type, btn) {
  attCurrentFilter = type;
  document.querySelectorAll('.att-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAttTable(type);
}

function renderAttTable(filter) {
  let list = getCurrentChildrenForModal();
  if (filter === 'miss-notice') list = list.filter(c => !c.noticeWritten);
  if (filter === 'medicine')    list = list.filter(c => c.medicine);
  if (filter === 'absent')      list = list.filter(c => c.attend !== '출석');

  document.getElementById('attModalTableBody').innerHTML = list.length === 0
    ? `<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--text-muted)">해당하는 원아가 없습니다.</td></tr>`
    : list.map((c, i) => `
      <tr>
        <td style="color:var(--text-muted);font-size:11px">${String(i+1).padStart(2,'0')}</td>
        <td style="font-weight:700">${c.name}</td>
        <td class="cell-link" onclick="goToAttendance('${c.id}','${c.name}','${c.attend}')" title="출석 상태 변경">
          ${attendBadge(c.attend)}
        </td>
        <td class="cell-link" onclick="goToNotice(${JSON.stringify(c)})" title="${c.noticeWritten ? '알림장 보기' : '알림장 작성'}">
          ${c.noticeWritten
            ? `<span class="sbadge" style="background:#CCFBF1;color:#0D9488">✓ 완료</span>`
            : `<span class="sbadge" style="background:var(--red-bg);color:var(--red-text)">✗ 미작성</span>`}
        </td>
        <td ${c.medicine ? `class="cell-link" onclick="goToMedicine(${JSON.stringify(c)})" title="투약의뢰서로 이동"` : ''}>
          ${c.medicine
            ? `<span class="sbadge" style="background:var(--amber-bg);color:var(--amber-text)">💊 ${c.medicine.count}회 · ${c.medicine.time}</span>`
            : `<span style="color:var(--text-muted);font-size:12px">—</span>`}
        </td>
      </tr>`).join('');
}

function goToNotice(child) {
  sessionStorage.setItem('noticePrefill', JSON.stringify({
    childId: child.id, childName: child.name,
    mode: child.noticeWritten ? 'view' : 'write'
  }));
  location.href = 'operation-notice-board.html';
}

function goToMedicine(child) {
  sessionStorage.setItem('medicinePrefill', JSON.stringify({
    childId: child.id, childName: child.name
  }));
  location.href = 'operation-medicine.html';
}

function goToAttendance(id, name, currentStatus) {
  showToast(`${name} 출석 상태: ${currentStatus} (출석 관리 기능 연동 예정)`);
}

// changeOrg / exitContext / logout → operation-sidebar.js 에서 전역 노출
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeAttendanceModal(); closeActivityModal(); }
});

function showToast(msg) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}
</script>
</body>
</html>
