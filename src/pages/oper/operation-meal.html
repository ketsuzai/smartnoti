<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식단표 — 키드키즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="operation-sidebar.js" defer></script>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
:root {
  --sidebar-bg:#0C2D48;--sidebar-hover:#1A4A6B;--sidebar-active:#1E5580;--sidebar-text:#B8D9F0;
  --sidebar-width:240px;--header-height:60px;
  --accent:#0EA5E9;--accent-light:#E0F2FE;--accent-dark:#0284C7;
  --bg-base:#F0F7FF;--bg-surface:#FFFFFF;
  --text-primary:#0C2D48;--text-secondary:#4B7FA3;--text-muted:#94B8D0;
  --border-light:#DBEAFE;--border-medium:#BAD9F7;
  --green:#10B981;--green-bg:#D1FAE5;--green-text:#065F46;
  --blue:#3B82F6;--blue-bg:#DBEAFE;--blue-text:#1E40AF;
  --amber:#F59E0B;--amber-bg:#FEF3C7;--amber-text:#92400E;
  --red:#EF4444;--red-bg:#FEE2E2;--red-text:#991B1B;
  --purple:#8B5CF6;--purple-bg:#EDE9FE;--purple-text:#5B21B6;
  --shadow-sm:0 1px 3px rgba(12,45,72,0.06);
  --shadow-md:0 4px 12px rgba(12,45,72,0.09);
  --shadow-lg:0 8px 28px rgba(12,45,72,0.11);
  --shadow-modal:0 20px 60px rgba(0,0,0,0.18);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:18px;

  /* 식사구분 색상 */
  --snack-am-bg:#FFF7ED;--snack-am-text:#C2410C;
  --lunch-bg:#EFF6FF;--lunch-text:#1D4ED8;
  --snack-pm-bg:#F5F3FF;--snack-pm-text:#6D28D9;
  --dinner-bg:#EEF2FF;--dinner-text:#3730A3;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--bg-base);color:var(--text-primary);display:flex;height:100vh;overflow:hidden;}

/* ━━━ LAYOUT ━━━ */
.main-wrap{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:900px;}

/* ━━━ TOPBAR ━━━ */
.topbar{height:var(--header-height);background:var(--bg-surface);border-bottom:1px solid var(--border-light);display:flex;align-items:center;padding:0 24px;gap:12px;box-shadow:var(--shadow-sm);flex-shrink:0;z-index:50;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text-secondary);flex:1;}
.breadcrumb .cur{color:var(--text-primary);font-weight:700;}
.bc-sep{color:var(--text-muted);font-size:12px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-date{font-size:13px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}

/* ━━━ CONTENT — SPLIT LAYOUT ━━━ */
.content{flex:1;overflow:hidden;padding:0;display:flex;flex-direction:column;}
.split-layout{display:flex;flex:1;gap:16px;padding:14px 24px 20px;overflow:hidden;}
.split-left{flex:0 0 58%;display:flex;flex-direction:column;gap:14px;min-width:0;overflow:hidden;}
.split-right{flex:1;overflow-y:auto;min-width:0;}
.split-right::-webkit-scrollbar{width:5px;}
.split-right::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:3px;}

/* ━━━ PAGE HEADER ━━━ */
.page-header{display:flex;align-items:center;padding:20px 24px 0;flex-shrink:0;}
.page-title{font-size:20px;font-weight:800;color:var(--text-primary);}
.page-title-sub{font-size:13px;color:var(--text-secondary);margin-top:2px;font-weight:500;}

/* ━━━ BUTTONS ━━━ */
.btn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 18px;border-radius:var(--radius-md);font-size:14px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;border:none;transition:.18s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-outline{background:#fff;color:var(--text-primary);border:1.5px solid var(--border-medium);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent-dark);background:var(--accent-light);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#DC2626;}
.btn-sm{height:32px;padding:0 12px;font-size:13px;}

/* ━━━ CALENDAR CARD ━━━ */
.calendar-card{background:var(--bg-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden;flex:1;display:flex;flex-direction:column;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light);}
.cal-nav{display:flex;align-items:center;gap:12px;}
.cal-nav-btn{width:34px;height:34px;border-radius:var(--radius-md);border:1.5px solid var(--border-light);background:var(--bg-base);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-secondary);transition:.15s;}
.cal-nav-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);}
.cal-month{font-size:18px;font-weight:800;color:var(--text-primary);font-family:'JetBrains Mono',monospace;}
.cal-legend{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;}

/* Calendar grid */
.cal-grid{width:100%;flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.cal-grid::-webkit-scrollbar{width:4px;}
.cal-grid::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:2px;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1.5px solid var(--border-light);flex-shrink:0;}
.cal-wday{padding:8px 4px;text-align:center;font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;}
.cal-wday:first-child{color:#EF4444;}
.cal-wday:last-child{color:#3B82F6;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{height:124px;padding:6px 6px 26px;border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light);cursor:pointer;transition:.15s;position:relative;display:flex;flex-direction:column;gap:4px;}
.cal-cell:nth-child(7n){border-right:none;}
/* last row cells - remove bottom border for cells in last row */
.cal-cell:hover{background:#F8FCFF;}
.cal-cell.other-month{background:#FAFCFF;cursor:default;pointer-events:none;}
.cal-cell.other-month .cal-date-num{color:var(--text-muted);opacity:.45;}
.cal-cell.today .cal-date-num{background:var(--accent);color:#fff;border-radius:50%;}
.cal-cell.selected{background:var(--accent-light);}
.cal-cell.selected:hover{background:#D4EDFC;}
.cal-cell.selected.today .cal-date-num{background:var(--accent-dark);color:#fff;box-shadow:0 0 0 2px #fff,0 0 0 4px var(--accent);}
.cal-cell.sunday .cal-date-num{color:#EF4444;}
.cal-cell.saturday .cal-date-num{color:#3B82F6;}
.cal-cell.today.sunday .cal-date-num,
.cal-cell.today.saturday .cal-date-num,
.cal-cell.selected.today.sunday .cal-date-num,
.cal-cell.selected.today.saturday .cal-date-num{color:#fff;}
.cal-date-num{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border-radius:50%;flex-shrink:0;transition:.15s;}
.cal-tags{display:flex;flex-direction:column;gap:2px;flex:1;}
.meal-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 5px;border-radius:3px;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.meal-tag.snack-am{background:var(--snack-am-bg);color:var(--snack-am-text);}
.meal-tag.lunch{background:var(--lunch-bg);color:var(--lunch-text);}
.meal-tag.snack-pm{background:var(--snack-pm-bg);color:var(--snack-pm-text);}
.meal-tag.dinner{background:var(--dinner-bg);color:var(--dinner-text);}
.meal-photo-icon{font-size:13px;flex-shrink:0;}
/* 미등록 셀 hover '+' 오버레이 */
.cal-cell-plus{
  display:none;position:absolute;inset:0;
  align-items:center;justify-content:center;
  background:rgba(14,165,233,0.08);
  border-radius:0;pointer-events:none;
}
.cal-cell-plus::after{
  content:'+';font-size:28px;font-weight:300;
  color:var(--accent);opacity:.7;line-height:1;
}
.cal-cell:not(.other-month):not(.has-meal):hover .cal-cell-plus{display:flex;}
.cal-cell:not(.other-month):not(.has-meal):hover{cursor:pointer;}

/* ━━━ CONTENT PANEL ━━━ */
.panel-card{background:var(--bg-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden;animation:panelIn .22s ease;}
@keyframes panelIn{from{opacity:0;transform:translateX(6px);}to{opacity:1;transform:translateX(0);}}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;}
.panel-date{font-size:16px;font-weight:800;color:var(--text-primary);}
.panel-actions{display:flex;align-items:center;gap:8px;}
.panel-body{padding:20px;}
.meal-section{display:flex;flex-direction:column;gap:16px;}
.meal-item{display:flex;flex-direction:column;gap:10px;padding:14px 16px;background:var(--bg-base);border-radius:var(--radius-lg);border:1px solid var(--border-light);}
.meal-type-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:800;white-space:nowrap;align-self:flex-start;}
.meal-type-badge.snack-am{background:var(--snack-am-bg);color:var(--snack-am-text);}
.meal-type-badge.lunch{background:var(--lunch-bg);color:var(--lunch-text);}
.meal-type-badge.snack-pm{background:var(--snack-pm-bg);color:var(--snack-pm-text);}
.meal-type-badge.dinner{background:var(--dinner-bg);color:var(--dinner-text);}
.meal-photo-panel{width:160px;height:160px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-medium);background:var(--border-light);flex-shrink:0;}
.meal-photo-panel img{width:100%;height:100%;object-fit:cover;display:block;}
.meal-content{min-width:0;}
.meal-menu{font-size:14px;color:var(--text-primary);line-height:1.7;font-weight:500;}
.panel-empty{text-align:center;padding:48px 20px;}
.panel-empty-icon{font-size:42px;margin-bottom:12px;}
.panel-empty-title{font-size:15px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;}
.panel-empty-desc{font-size:13px;color:var(--text-muted);margin-bottom:20px;}

/* ━━━ PANEL EDIT MODE ━━━ */
.panel-header.edit-mode{background:var(--accent-light);border-bottom-color:var(--accent);}
.panel-edit-hint{font-size:12px;color:var(--accent-dark);font-weight:600;margin-top:2px;}
.pedit-body{padding:0;}
.pedit-section{padding:14px 20px;border-bottom:1px solid var(--border-light);}
.pedit-section:last-of-type{border-bottom:none;}
.pedit-section-head{margin-bottom:8px;}
.pedit-textarea{width:100%;min-height:62px;padding:9px 12px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text-primary);background:var(--bg-base);resize:vertical;outline:none;transition:.18s;line-height:1.6;}
.pedit-textarea:focus{border-color:var(--accent);background:#fff;}
.pedit-textarea::placeholder{color:var(--text-muted);}
.pedit-photo-row{display:flex;align-items:flex-start;gap:10px;margin-top:8px;}
.photo-upload-area{width:80px;height:80px;border:1.5px dashed var(--border-medium);border-radius:var(--radius-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:.18s;background:var(--bg-base);flex-shrink:0;}
.photo-upload-area:hover{border-color:var(--accent);background:var(--accent-light);}
.photo-upload-label{font-size:11px;color:var(--text-muted);text-align:center;}
.photo-preview-wrap{display:flex;align-items:flex-start;gap:8px;}
.photo-preview-thumb{width:80px;height:80px;border-radius:var(--radius-md);object-fit:cover;border:1px solid var(--border-medium);display:block;flex-shrink:0;}
.photo-remove-btn{font-size:11px;color:var(--red-text);background:var(--red-bg);border:none;border-radius:var(--radius-sm);padding:2px 7px;cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:700;transition:.15s;margin-top:4px;display:block;}
.photo-remove-btn:hover{background:var(--red);color:#fff;}
.pedit-err{font-size:12px;color:var(--red-text);padding:6px 20px 14px;display:none;}
.pedit-err.show{display:block;}

/* ━━━ CONFIRM MODAL ━━━ */
.cm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
.cm-overlay.open{opacity:1;pointer-events:all;}
.cm-box{background:var(--bg-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-modal);padding:28px 26px;width:360px;text-align:center;transform:scale(.95);transition:.2s;}
.cm-overlay.open .cm-box{transform:scale(1);}
.cm-icon{font-size:38px;margin-bottom:12px;}
.cm-title{font-size:16px;font-weight:800;color:var(--text-primary);margin-bottom:8px;}
.cm-msg{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:22px;}
.cm-btns{display:flex;gap:8px;justify-content:center;}
.cm-btn{height:38px;padding:0 24px;border-radius:var(--radius-md);font-size:14px;font-weight:700;font-family:'Pretendard',sans-serif;cursor:pointer;border:none;transition:.18s;}
.cm-cancel{background:var(--bg-base);border:1.5px solid var(--border-medium);color:var(--text-secondary);}
.cm-cancel:hover{background:var(--border-light);}
.cm-delete{background:var(--red);color:#fff;}
.cm-delete:hover{background:#DC2626;}

/* ━━━ ALLERGEN ━━━ */
.meal-allergen-row{display:flex;align-items:flex-start;gap:6px;margin-top:6px;flex-wrap:wrap;}
.allergen-label{font-size:11px;font-weight:700;color:var(--amber-text);background:var(--amber-bg);padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.allergen-text{font-size:12px;color:var(--text-secondary);line-height:1.5;}
.pedit-allergen-input{width:100%;padding:6px 10px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);font-size:12px;font-family:'Pretendard',sans-serif;color:var(--text-primary);background:var(--bg-base);outline:none;transition:.18s;margin-top:6px;}
.pedit-allergen-input:focus{border-color:var(--amber);background:#fff;}
.pedit-allergen-input::placeholder{color:var(--text-muted);}
.pedit-allergen-label{font-size:11px;font-weight:700;color:var(--amber-text);margin-top:8px;display:flex;align-items:center;gap:4px;}

/* ━━━ PANEL META ━━━ */
.panel-meta{padding:12px 20px;border-top:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:var(--bg-base);}
.panel-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);}
.panel-meta-item strong{color:var(--text-secondary);font-weight:600;}

/* ━━━ TOAST ━━━ */
.toast-wrap{position:fixed;bottom:28px;right:28px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#1A2E40;color:#fff;padding:12px 18px;border-radius:var(--radius-lg);font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;animation:toastIn .25s ease;pointer-events:none;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.toast.out{animation:toastOut .25s ease forwards;}
@keyframes toastOut{to{opacity:0;transform:translateY(10px);}}
</style>
</head>
<body>
<aside id="appSidebar"></aside>

<div class="main-wrap">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="breadcrumb">
      <span>운영관리</span>
      <span class="bc-sep">›</span>
      <span id="breadcrumbOrg">해맑은 어린이집</span>
      <span class="bc-sep">›</span>
      <span class="cur">식단표</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbarDate"></span>
    </div>
  </div>

  <!-- CONTENT — SPLIT LAYOUT -->
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">🍱 식단표</div>
        <div class="page-title-sub">기관 공통 급식 식단을 등록하고 학부모에게 공유합니다</div>
      </div>
    </div>
    <div class="split-layout">

      <!-- LEFT: Calendar -->
      <div class="split-left">
        <div class="calendar-card">
          <div class="cal-header">
            <div class="cal-nav">
              <button class="cal-nav-btn" id="btnPrevMonth">‹</button>
              <div class="cal-month" id="calMonthLabel"></div>
              <button class="cal-nav-btn" id="btnNextMonth">›</button>
            </div>
            <div class="cal-legend">
              <div class="cal-legend-item"><span class="legend-dot" style="background:#C2410C"></span>오전간식</div>
              <div class="cal-legend-item"><span class="legend-dot" style="background:#1D4ED8"></span>점심</div>
              <div class="cal-legend-item"><span class="legend-dot" style="background:#6D28D9"></span>오후간식</div>
              <div class="cal-legend-item"><span class="legend-dot" style="background:#3730A3"></span>석식</div>
            </div>
          </div>
          <div class="cal-grid">
            <div class="cal-weekdays">
              <div class="cal-wday">일</div>
              <div class="cal-wday">월</div>
              <div class="cal-wday">화</div>
              <div class="cal-wday">수</div>
              <div class="cal-wday">목</div>
              <div class="cal-wday">금</div>
              <div class="cal-wday">토</div>
            </div>
            <div class="cal-days" id="calDays"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Content Panel (항상 표시) -->
      <div class="split-right">
        <div id="contentPanel"></div>
      </div>

    </div>
  </div>
</div>

<!-- 삭제 확인 Modal -->
<div class="cm-overlay" id="deleteModal">
  <div class="cm-box">
    <div class="cm-icon">🗑️</div>
    <div class="cm-title">식단 삭제</div>
    <div class="cm-msg">해당 날짜의 식단을 삭제하시겠습니까?<br>이 작업은 되돌릴 수 없습니다.</div>
    <div class="cm-btns">
      <button class="cm-btn cm-cancel" onclick="closeDeleteModal()">취소</button>
      <button class="cm-btn cm-delete" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Hidden file input -->
<input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MOCK DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  {

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TODAY = new Date(2026, 3, 7); // 2026-04-07
let currentYear = TODAY.getFullYear();
let currentMonth = TODAY.getMonth();
let selectedDate = null;
let editingId = null;
let deletingDate = null;
let pendingPhotoKey = null;
let panelMode = 'view';   // 'view' | 'edit'
let panelEditDate = null;
let panelPhotos = {};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('DOMContentLoaded', () => {
  updateTopbarDate();
  renderCalendar();
  selectDate(formatDate(TODAY));

  document.getElementById('btnPrevMonth').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    selectedDate = null;
    renderCalendar();
    renderPanel(null);
  });
  document.getElementById('btnNextMonth').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    selectedDate = null;
    renderCalendar();
    renderPanel(null);
  });

});

function updateTopbarDate() {
  const d = new Date(2026, 3, 7);
  document.getElementById('topbarDate').textContent =
    d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function getMealPlan(dateStr) {
  return mealPlans.find(p => p.date === dateStr) || null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CALENDAR RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCalendar() {
  const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent = `${currentYear}년 ${MONTHS_KO[currentMonth]}`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

  const container = document.getElementById('calDays');
  container.innerHTML = '';

  const todayStr = formatDate(TODAY);

  // Prev month overflow
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    const dateStr = formatDate(new Date(currentMonth === 0 ? currentYear - 1 : currentYear, currentMonth === 0 ? 11 : currentMonth - 1, d));
    container.appendChild(buildCell(d, dateStr, true));
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = formatDate(new Date(currentYear, currentMonth, d));
    const cell = buildCell(d, dateStr, false, dateStr === todayStr, dateStr === selectedDate);
    container.appendChild(cell);
  }

  // Next month overflow
  const totalCells = container.children.length;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remaining; d++) {
    const dateStr = formatDate(new Date(currentMonth === 11 ? currentYear + 1 : currentYear, currentMonth === 11 ? 0 : currentMonth + 1, d));
    container.appendChild(buildCell(d, dateStr, true));
  }
}

function buildCell(day, dateStr, otherMonth, isToday = false, isSelected = false) {
  const cell = document.createElement('div');
  const meal = getMealPlan(dateStr);
  const hasMeal = !!meal;
  const dow = new Date(dateStr).getDay();

  let cls = 'cal-cell';
  if (otherMonth) cls += ' other-month';
  if (isToday) cls += ' today';
  if (isSelected) cls += ' selected';
  if (hasMeal) cls += ' has-meal';
  if (dow === 0) cls += ' sunday';
  if (dow === 6) cls += ' saturday';
  cell.className = cls;

  if (!otherMonth) {
    cell.addEventListener('click', () => selectDate(dateStr));
  }

  // Date number
  const numEl = document.createElement('div');
  numEl.className = 'cal-date-num';
  numEl.textContent = day;
  cell.appendChild(numEl);

  // Meal tags
  if (!otherMonth && hasMeal) {
    const tagsWrap = document.createElement('div');
    tagsWrap.className = 'cal-tags';

    const tagDefs = [
      { key: 'snack_am_menu', cls: 'snack-am', label: '오전 간식' },
      { key: 'lunch_menu',    cls: 'lunch',    label: '점심 식사'    },
      { key: 'snack_pm_menu', cls: 'snack-pm', label: '오후 간식'},
      { key: 'dinner_menu',   cls: 'dinner',   label: '석식'    },
    ];
    tagDefs.forEach(td => {
      if (meal[td.key]) {
        const tag = document.createElement('div');
        const hasPhoto = !!(meal[td.key.replace('_menu', '_image_url')]);
        tag.className = `meal-tag ${td.cls}`;
        tag.innerHTML = `${td.label}${hasPhoto ? ' <span class="meal-photo-icon">📷</span>' : ''}`;
        tagsWrap.appendChild(tag);
      }
    });
    cell.appendChild(tagsWrap);
  }

  // 미등록 셀 '+' 오버레이 (CSS ::after로 렌더링, JS는 div만 추가)
  if (!otherMonth && !hasMeal) {
    const plusEl = document.createElement('div');
    plusEl.className = 'cal-cell-plus';
    cell.appendChild(plusEl);
  }

  return cell;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SELECT DATE → SHOW PANEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function selectDate(dateStr) {
  if (panelMode === 'edit' && dateStr !== panelEditDate) {
    if (!confirm('저장하지 않은 내용이 있습니다. 이동하시겠습니까?')) return;
    panelMode = 'view';
    panelPhotos = {};
  }
  selectedDate = dateStr;
  renderCalendar();
  renderPanel(dateStr);
}

function renderPanel(dateStr) {
  const panel = document.getElementById('contentPanel');

  if (!dateStr) {
    panel.innerHTML = `
      <div class="panel-card">
        <div class="panel-body">
          <div class="panel-empty">
            <div class="panel-empty-icon">📅</div>
            <div class="panel-empty-title">날짜를 선택해주세요</div>
            <div class="panel-empty-desc">달력에서 날짜를 클릭하면 식단 내용이 표시됩니다.</div>
          </div>
        </div>
      </div>`;
    return;
  }

  const meal = getMealPlan(dateStr);
  const d = new Date(dateStr + 'T00:00:00');
  const DAYS = ['일','월','화','수','목','금','토'];
  const dateLabel = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;

  let html = `
    <div class="panel-card">
      <div class="panel-header">
        <div class="panel-date">${dateLabel}</div>
        <div class="panel-actions">
          ${meal ? `
            <button class="btn btn-outline btn-sm" onclick="openPanelEdit('${dateStr}')">✏️ 수정</button>
            <button class="btn btn-sm" style="background:var(--red-bg);color:var(--red-text);border:1.5px solid var(--red-bg);" onclick="openDeleteModal('${dateStr}')">🗑️ 삭제</button>
          ` : ''}
        </div>
      </div>
      <div class="panel-body">
  `;

  if (meal) {
    const sections = [
      { key_m: 'snack_am_menu', key_i: 'snack_am_image_url', key_a: 'snack_am_allergens', cls: 'snack-am', label: '오전 간식' },
      { key_m: 'lunch_menu',    key_i: 'lunch_image_url',    key_a: 'lunch_allergens',    cls: 'lunch',    label: '점심 식사' },
      { key_m: 'snack_pm_menu', key_i: 'snack_pm_image_url', key_a: 'snack_pm_allergens', cls: 'snack-pm', label: '오후 간식' },
      { key_m: 'dinner_menu',   key_i: 'dinner_image_url',   key_a: 'dinner_allergens',   cls: 'dinner',   label: '석식' },
    ];
    const registered = sections.filter(s => meal[s.key_m]);

    if (registered.length === 0) {
      html += `<div class="panel-empty"><div class="panel-empty-icon">🍽️</div><div class="panel-empty-title">등록된 식단이 없습니다.</div></div>`;
      html += `</div></div>`; // close panel-body + panel-card
    } else {
      html += `<div class="meal-section">`;
      registered.forEach(s => {
        const menuText = meal[s.key_m];
        const imgUrl   = meal[s.key_i];
        const allergen = meal[s.key_a];
        html += `
          <div class="meal-item">
            <span class="meal-type-badge ${s.cls}">${s.label}</span>
            ${imgUrl ? `<div class="meal-photo-panel"><img src="${imgUrl}" alt="${s.label} 사진"></div>` : ''}
            <div class="meal-content">
              <div class="meal-menu">${menuText.replace(/,\s*/g, ' · ')}</div>
              ${allergen ? `<div class="meal-allergen-row"><span class="allergen-label">⚠️ 알레르기</span><span class="allergen-text">${allergen}</span></div>` : ''}
            </div>
          </div>
        `;
      });
      html += `</div></div>`; // close meal-section + panel-body

      // 작성자 / 작성일시 (panel-card 직속, full-width border-top)
      const authorName = USERS[meal.created_by] || meal.created_by;
      const createdDt = new Date(meal.created_at);
      const createdStr = `${createdDt.getFullYear()}.${String(createdDt.getMonth()+1).padStart(2,'0')}.${String(createdDt.getDate()).padStart(2,'0')} ${String(createdDt.getHours()).padStart(2,'0')}:${String(createdDt.getMinutes()).padStart(2,'0')}`;
      html += `
        <div class="panel-meta">
          <div class="panel-meta-item">✍️ 작성자 <strong>${authorName}</strong></div>
          <div class="panel-meta-item">🕐 작성일시 <strong>${createdStr}</strong></div>
        </div>`;
      html += `</div>`; // close panel-card
    }
  } else {
    html += `
      <div class="panel-empty">
        <div class="panel-empty-icon">🍽️</div>
        <div class="panel-empty-title">등록된 식단이 없습니다.</div>
        <div class="panel-empty-desc">이 날짜에 등록된 식단 정보가 없습니다.</div>
        <button class="btn btn-primary" onclick="openPanelEdit('${dateStr}')">+ 식단 등록하기</button>
      </div>
    `;
    html += `</div></div>`; // close panel-body + panel-card
  }

  panel.innerHTML = html;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  { key: 'snack_am', key_m: 'snack_am_menu', key_i: 'snack_am_image_url', key_a: 'snack_am_allergens', cls: 'snack-am', label: '오전 간식', placeholder: '예) 찐빵, 우유', allergen_placeholder: '예) 밀, 우유, 계란' },
  { key: 'lunch',    key_m: 'lunch_menu',    key_i: 'lunch_image_url',    key_a: 'lunch_allergens',    cls: 'lunch',    label: '점심 식사', placeholder: '예) 잡곡밥, 미역국, 돈까스, 깍두기', allergen_placeholder: '예) 밀, 돼지고기, 대두' },
  { key: 'snack_pm', key_m: 'snack_pm_menu', key_i: 'snack_pm_image_url', key_a: 'snack_pm_allergens', cls: 'snack-pm', label: '오후 간식', placeholder: '예) 쿠키, 주스', allergen_placeholder: '예) 밀, 계란' },
  { key: 'dinner',   key_m: 'dinner_menu',   key_i: 'dinner_image_url',   key_a: 'dinner_allergens',   cls: 'dinner',   label: '석식',     placeholder: '예) 된장찌개, 잡채, 현미밥', allergen_placeholder: '예) 대두, 생선' },
];

function openPanelEdit(dateStr) {
  const existing = getMealPlan(dateStr);
  editingId = existing ? existing.id : null;
  panelEditDate = dateStr;
  panelMode = 'edit';
  panelPhotos = {};

  const d = new Date(dateStr + 'T00:00:00');
  const DAYS = ['일','월','화','수','목','금','토'];
  const dateLabel = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;

  let sectionsHtml = MEAL_SECTIONS.map(s => {
    const val = existing?.[s.key_m] || '';
    const allergenVal = existing?.[s.key_a] || '';
    return `
      <div class="pedit-section">
        <div class="pedit-section-head">
          <span class="meal-type-badge ${s.cls}">${s.label}</span>
        </div>
        <textarea class="pedit-textarea" id="pedit-${s.key}" placeholder="${s.placeholder}">${val}</textarea>
        <div class="pedit-allergen-label">⚠️ 알레르기 유발성분</div>
        <input type="text" class="pedit-allergen-input" id="pedit-allergen-${s.key}" placeholder="${s.allergen_placeholder}" value="${allergenVal}">
        <div class="pedit-photo-row">
          <div id="pedit-photo-preview-${s.key}"></div>
          <div class="photo-upload-area" id="pedit-upload-${s.key}" onclick="triggerPanelPhoto('${s.key}')">
            <div style="font-size:20px">📷</div>
            <div class="photo-upload-label">사진 업로드</div>
          </div>
        </div>
      </div>`;
  }).join('');

  const panel = document.getElementById('contentPanel');
  panel.innerHTML = `
    <div class="panel-card">
      <div class="panel-header edit-mode">
        <div>
          <div class="panel-date">${dateLabel}</div>
          <div class="panel-edit-hint">${editingId ? '식단 수정 중' : '식단 등록 중'}</div>
        </div>
        <div class="panel-actions">
          <button class="btn btn-outline btn-sm" onclick="cancelPanelEdit()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="savePanelEdit()">저장</button>
        </div>
      </div>
      <div class="panel-body pedit-body">
        ${sectionsHtml}
        <div class="pedit-err" id="pedit-err">최소 1개 식사구분을 입력해주세요.</div>
      </div>
    </div>`;

  // 기존 이미지 복원
  MEAL_SECTIONS.forEach(s => {
    const imgUrl = existing?.[s.key_i];
    if (imgUrl) renderPanelPhotoPreview(s.key, imgUrl);
  });

  // 첫 번째 textarea에 포커스
  document.getElementById('pedit-snack_am')?.focus();
}

function cancelPanelEdit() {
  panelMode = 'view';
  panelPhotos = {};
  panelEditDate = null;
  renderPanel(selectedDate);
}

function savePanelEdit() {
  const values = {};
  const allergens = {};
  MEAL_SECTIONS.forEach(s => {
    values[s.key] = document.getElementById(`pedit-${s.key}`)?.value.trim() || '';
    allergens[s.key] = document.getElementById(`pedit-allergen-${s.key}`)?.value.trim() || '';
  });

  const hasAny = MEAL_SECTIONS.some(s => values[s.key]);
  if (!hasAny) {
    document.getElementById('pedit-err').classList.add('show');
    return;
  }

  if (editingId) {
    const plan = mealPlans.find(p => p.id === editingId);
    if (plan) {
      MEAL_SECTIONS.forEach(s => {
        plan[s.key_m] = values[s.key] || null;
        plan[s.key_a] = allergens[s.key] || null;
        if (panelPhotos[s.key] !== undefined) plan[s.key_i] = panelPhotos[s.key] || null;
      });
      plan.updated_at = new Date().toISOString();
    }
  } else {
    const newPlan = {
      id: 'MP' + String(Date.now()).slice(-4),
      org_id: 'ORG001',
      date: panelEditDate,
      created_by: 'TCH001',
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };
    MEAL_SECTIONS.forEach(s => {
      newPlan[s.key_m] = values[s.key] || null;
      newPlan[s.key_a] = allergens[s.key] || null;
      newPlan[s.key_i] = panelPhotos[s.key] || null;
    });
    mealPlans.push(newPlan);
  }

  const savedDate = panelEditDate;
  panelMode = 'view';
  panelPhotos = {};
  panelEditDate = null;
  renderCalendar();
  renderPanel(savedDate);
  showToast(editingId ? '✅ 식단이 수정되었습니다.' : '✅ 식단이 등록되었습니다.');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PANEL PHOTO
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function triggerPanelPhoto(key) {
  pendingPhotoKey = key;
  document.getElementById('photoFileInput').click();
}

function handlePhotoSelect(e) {
  const file = e.target.files[0];
  if (!file || !pendingPhotoKey) return;
  const reader = new FileReader();
  reader.onload = ev => {
    panelPhotos[pendingPhotoKey] = ev.target.result;
    renderPanelPhotoPreview(pendingPhotoKey, ev.target.result);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function renderPanelPhotoPreview(key, url) {
  const preview = document.getElementById(`pedit-photo-preview-${key}`);
  const uploadArea = document.getElementById(`pedit-upload-${key}`);
  if (!preview) return;
  if (!url) {
    preview.innerHTML = '';
    if (uploadArea) uploadArea.style.display = '';
    return;
  }
  preview.innerHTML = `
    <div class="photo-preview-wrap">
      <img class="photo-preview-thumb" src="${url}" alt="사진 미리보기">
      <div>
        <button class="photo-remove-btn" onclick="removePanelPhoto('${key}')">삭제</button>
      </div>
    </div>`;
  if (uploadArea) uploadArea.style.display = 'none';
}

function removePanelPhoto(key) {
  panelPhotos[key] = null;
  if (editingId) {
    const plan = mealPlans.find(p => p.id === editingId);
    const s = MEAL_SECTIONS.find(s => s.key === key);
    if (plan && s) plan[s.key_i] = null;
  }
  renderPanelPhotoPreview(key, null);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DELETE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openDeleteModal(dateStr) {
  deletingDate = dateStr;
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
  deletingDate = null;
}

function confirmDelete() {
  if (!deletingDate) return;
  mealPlans = mealPlans.filter(p => p.date !== deletingDate);
  closeDeleteModal();
  renderCalendar();
  renderPanel(deletingDate);
  showToast('🗑️ 식단이 삭제되었습니다.');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TOAST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showToast(msg) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 260);
  }, 2600);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ESC KEY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('deleteModal').classList.contains('open')) closeDeleteModal();
    else if (panelMode === 'edit') cancelPanelEdit();
  }
});
document.getElementById('deleteModal').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteModal();
});
</script>
