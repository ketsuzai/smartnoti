<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알림장 — 키드키즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="operation-sidebar.js" defer></script>
<style>
:root {
  --sidebar-bg:     #0C2D48;
  --sidebar-hover:  #1A4A6B;
  --sidebar-active: #1E5580;
  --sidebar-text:   #B8D9F0;
  --sidebar-width:  240px;
  --header-height:  60px;
  --accent:         #0EA5E9;
  --accent-light:   #E0F2FE;
  --accent-dark:    #0284C7;
  --bg-base:        #F0F7FF;
  --bg-surface:     #FFFFFF;
  --text-primary:   #0C2D48;
  --text-secondary: #4B7FA3;
  --text-muted:     #94B8D0;
  --border-light:   #DBEAFE;
  --border-medium:  #BAD9F7;
  --green:  #10B981; --green-bg:  #D1FAE5; --green-text:  #065F46;
  --blue:   #3B82F6; --blue-bg:   #DBEAFE; --blue-text:   #1E40AF;
  --amber:  #F59E0B; --amber-bg:  #FEF3C7; --amber-text:  #92400E;
  --red:    #EF4444; --red-bg:    #FEE2E2; --red-text:    #991B1B;
  --purple: #8B5CF6; --purple-bg: #EDE9FE; --purple-text: #5B21B6;
  --shadow-sm: 0 1px 3px rgba(12,45,72,0.06);
  --shadow-md: 0 4px 12px rgba(12,45,72,0.09);
  --shadow-lg: 0 8px 28px rgba(12,45,72,0.11);
  --shadow-modal: 0 20px 60px rgba(0,0,0,0.18);
  --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-xl:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--bg-base);color:var(--text-primary);display:flex;height:100vh;overflow:hidden;}

/* ━━━ MAIN ━━━ */
.main-wrap{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ━━━ TOPBAR ━━━ */
.topbar{height:var(--header-height);background:var(--bg-surface);border-bottom:1px solid var(--border-light);display:flex;align-items:center;padding:0 24px;gap:12px;box-shadow:var(--shadow-sm);flex-shrink:0;z-index:50;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);flex:1;}
.breadcrumb .cur{color:var(--text-primary);font-weight:600;}
.bc-sep{color:var(--text-muted);font-size:11px;}
/* ━━━ 오늘의 현황 ━━━ */
.today-section{margin-bottom:16px;}
.today-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.today-section-title{font-size:14px;font-weight:800;color:var(--text-primary);display:flex;align-items:center;gap:6px;}
.today-section-meta{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
.today-children-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;}
.today-children-grid::-webkit-scrollbar{height:4px;}
.today-children-grid::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:2px;}
.today-child-card{flex-shrink:0;width:108px;border-radius:var(--radius-lg);padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;border:1.5px solid transparent;cursor:pointer;transition:box-shadow .18s,transform .18s;position:relative;}
.today-child-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.tcc-present{background:#F0FDF4;border-color:#A7F3D0;}
.tcc-absent {background:#FEF2F2;border-color:#FECACA;}
.tcc-sick   {background:#FFFBEB;border-color:#FCD34D;}
.tcc-leave  {background:#EFF6FF;border-color:#BAD9F7;}
.tcc-unknown{background:#F9FAFB;border-color:#E5E7EB;}
.tcc-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;position:relative;flex-shrink:0;}
.tcc-comment-dot{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:var(--red);border:2px solid var(--bg-surface);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;}
.tcc-name{font-size:12px;font-weight:700;color:var(--text-primary);text-align:center;line-height:1.2;}
.tcc-age{font-size:10px;color:var(--text-secondary);font-weight:500;}
.tcc-attend-label{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.tcc-al-present{background:var(--green-bg);color:var(--green-text);}
.tcc-al-absent {background:var(--red-bg);  color:var(--red-text);}
.tcc-al-sick   {background:var(--amber-bg);color:var(--amber-text);}
.tcc-al-leave  {background:var(--blue-bg); color:var(--blue-text);}
.tcc-al-unknown{background:#F3F4F6;color:#9CA3AF;}
.tcc-notice-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.tcc-notice-done{background:var(--green-bg);color:var(--green-text);}
.tcc-notice-none{background:#F3F4F6;color:#9CA3AF;}

/* 알림장 카드 내 원아 chips */
.nc-children{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.nc-child-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:600;background:var(--accent-light);color:var(--accent-dark);}
.nc-child-chip-av{width:13px;height:13px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#fff;flex-shrink:0;}
.nc-comment-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;background:var(--amber-bg);color:var(--amber-text);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-date{font-size:12px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;background:var(--bg-base);border:1px solid var(--border-light);cursor:pointer;transition:.18s;font-size:16px;position:relative;}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent);}
.notif-dot::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--red);border:1.5px solid var(--bg-surface);}

/* ━━━ CONTENT ━━━ */
.content{flex:1;overflow-y:auto;padding:20px 24px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:3px;}

/* 페이지 헤더 */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.page-title{font-size:21px;font-weight:800;letter-spacing:-.5px;}
.page-sub{font-size:13px;color:var(--text-secondary);margin-top:3px;}

/* ━━━ KPI ━━━ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi-card{background:var(--bg-surface);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);display:flex;align-items:center;gap:12px;transition:box-shadow .2s;}
.kpi-card:hover{box-shadow:var(--shadow-md);}
.kpi-ico{width:44px;height:44px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.kpi-ico.sky{background:#E0F2FE;}
.kpi-ico.green{background:var(--green-bg);}
.kpi-ico.amber{background:var(--amber-bg);}
.kpi-ico.red{background:var(--red-bg);}
.kpi-label{font-size:11px;color:var(--text-secondary);font-weight:500;margin-bottom:2px;}
.kpi-value{font-size:23px;font-weight:800;color:var(--text-primary);letter-spacing:-.8px;line-height:1;}
.kpi-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* ━━━ 탭 ━━━ */
.tab-bar{display:flex;gap:0;background:var(--bg-surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:5px;margin-bottom:14px;box-shadow:var(--shadow-sm);width:fit-content;}
.tab-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);font-family:'Pretendard',sans-serif;transition:.18s;}
.tab-btn:hover{color:var(--accent-dark);background:var(--accent-light);}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(14,165,233,.3);}
.tab-count{font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;background:rgba(255,255,255,.25);}
.tab-btn:not(.active) .tab-count{background:var(--border-light);color:var(--text-secondary);}

/* ━━━ 필터바 ━━━ */
.filter-bar{background:var(--bg-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);padding:14px 18px;border:1px solid var(--border-light);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.filter-group{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
.fsel-wrap{position:relative;}
.fsel-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text-muted);pointer-events:none;}
.fsel{height:34px;padding:0 28px 0 10px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);font-size:12px;font-family:'Pretendard',sans-serif;color:var(--text-primary);background:var(--bg-surface);appearance:none;cursor:pointer;outline:none;transition:.18s;}
.fsel:focus{border-color:var(--accent);}
.search-wrap{display:flex;align-items:center;border:1.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;background:var(--bg-surface);transition:.18s;}
.search-wrap:focus-within{border-color:var(--accent);}
.search-inp{height:34px;padding:0 10px;border:none;outline:none;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text-primary);background:transparent;width:140px;}
.btn-reset{height:34px;padding:0 12px;background:var(--bg-base);border:1.5px solid var(--border-light);border-radius:var(--radius-md);font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:.18s;font-family:'Pretendard',sans-serif;}
.btn-reset:hover{background:var(--border-light);}
.filter-date-range{display:flex;align-items:center;gap:4px;}
.filter-date-range input{height:32px;padding:0 8px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);font-size:12px;color:var(--text-primary);font-family:'Pretendard',sans-serif;outline:none;transition:border-color .18s;}
.filter-date-range input:focus{border-color:var(--accent);}
.filter-date-range span{font-size:11px;color:var(--text-muted);}

/* ━━━ 액션바 ━━━ */
.action-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.action-left{display:flex;align-items:center;gap:8px;}
.action-right{display:flex;align-items:center;gap:8px;}
.total-count{font-size:13px;color:var(--text-secondary);}
.total-count strong{color:var(--text-primary);font-weight:700;}
.btn{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;border:none;transition:.18s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-outline{background:#fff;color:var(--text-primary);border:1.5px solid var(--border-medium);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent-dark);background:var(--accent-light);}
.btn-sm{height:30px;padding:0 12px;font-size:12px;}

/* ━━━ 날짜 그룹 ━━━ */
.date-group{margin-bottom:16px;}
.date-group-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.date-group-label{font-size:12px;font-weight:700;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;}
.date-group-line{flex:1;height:1px;background:var(--border-light);}
.date-group-count{font-size:11px;color:var(--text-muted);font-weight:500;}

/* ━━━ 보낸 알림장 카드 ━━━ */
.notice-card{background:var(--bg-surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:14px 16px 12px 19px;margin-bottom:8px;cursor:pointer;transition:box-shadow .18s,border-color .18s;display:flex;gap:14px;align-items:flex-start;position:relative;overflow:hidden;}
.notice-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-medium);}

/* 좌측 상태 강조바 */
.nc-accent{position:absolute;left:0;top:0;bottom:0;width:4px;}
.nc-accent.published{background:var(--green);}
.nc-accent.draft{background:var(--amber);}
.nc-accent.recalled{background:#9CA3AF;}
.nc-accent.scheduled{background:var(--purple);}

.nc-left{flex:1;min-width:0;}

/* 교사 정보 행 */
.nc-teacher-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.nc-teacher-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.nc-teacher-info{flex:1;}
.nc-teacher-name{font-size:13px;font-weight:700;color:var(--text-primary);}
.nc-teacher-class{font-size:11px;color:var(--text-secondary);}

/* 날씨·메타 */
.nc-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-secondary);flex-wrap:wrap;margin-bottom:5px;}
.nc-meta-item{display:flex;align-items:center;gap:3px;}
.nc-weather{font-size:13px;}

/* 본문 미리보기 */
.nc-preview{font-size:12.5px;color:var(--text-secondary);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px;}

/* 카드 푸터 */
.nc-footer{display:flex;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--border-light);margin-top:4px;}
.nc-footer-meta{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap;}
.nc-footer-item{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text-muted);}
.nc-act-btns{display:flex;gap:4px;}
.nc-act-btn{width:26px;height:26px;border-radius:var(--radius-sm);border:1px solid var(--border-light);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.18s;color:var(--text-secondary);}
.nc-act-btn:hover{background:var(--accent-light);border-color:var(--accent);}
.nc-act-btn.danger:hover{background:var(--red-bg);border-color:#FECACA;color:var(--red);}

.nc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.nc-time{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}

/* 상태 뱃지 */
.nbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;}
.nbadge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.nb-published{background:var(--green-bg);color:var(--green-text);}
.nb-draft{background:#F3F4F6;color:#6B7280;}
.nb-recalled{background:var(--red-bg);color:var(--red-text);}
.nb-scheduled{background:var(--blue-bg);color:var(--blue-text);}
.nc-ai-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--purple-bg);color:var(--purple-text);}

/* ━━━ 받은 알림장 카드 ━━━ */
.parent-notice-card{background:var(--bg-surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:box-shadow .18s,border-color .18s;}
.parent-notice-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-medium);}
.parent-notice-card.unread-card{border-left:3px solid var(--red);}

.pnc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.pnc-category{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;}
.pnc-sub{font-size:12px;font-weight:700;color:var(--text-primary);flex:1;}
.unread-pip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--red-bg);color:var(--red-text);}

.pnc-info{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.child-avatar-sm{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
.pnc-names{font-size:12px;font-weight:600;color:var(--text-primary);}
.pnc-names span{color:var(--text-secondary);font-weight:400;}

.pnc-content{font-size:12.5px;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;}
.pnc-footer{display:flex;align-items:center;justify-content:space-between;}
.pnc-time{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
.pnc-reply-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--accent-dark);background:var(--accent-light);border:none;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.18s;}
.pnc-reply-btn:hover{background:var(--accent);color:#fff;}

/* 빈 상태 */
.empty-state{text-align:center;padding:52px 24px;color:var(--text-muted);}
.empty-state-icon{font-size:42px;margin-bottom:10px;}
.empty-state-text{font-size:14px;font-weight:600;color:var(--text-secondary);}
.empty-state-sub{font-size:12px;margin-top:4px;}

/* ━━━ 오버레이 ━━━ */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
.panel-overlay.show{opacity:1;pointer-events:all;}

/* ━━━ 상세 뷰어 패널 (480px) ━━━ */
.detail-panel{position:fixed;right:0;top:0;height:100vh;width:480px;background:#fff;z-index:400;box-shadow:-8px 0 32px rgba(12,45,72,.12);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.detail-panel.show{transform:translateX(0);}

.panel-header{height:60px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.panel-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;}
.panel-close{width:32px;height:32px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg-base);border:1px solid var(--border-light);font-size:16px;transition:.18s;color:var(--text-secondary);}
.panel-close:hover{background:var(--red-bg);border-color:#FECACA;color:var(--red);}

/* 패널 탭 (원아별) */
.panel-tabs{display:flex;border-bottom:1px solid var(--border-light);flex-shrink:0;background:#FAFCFF;overflow-x:auto;}
.panel-tabs::-webkit-scrollbar{height:3px;}
.panel-tabs::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:2px;}
.panel-tab{flex-shrink:0;padding:10px 14px;text-align:center;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;border-bottom:2.5px solid transparent;transition:.18s;white-space:nowrap;}
.panel-tab:hover{color:var(--accent-dark);}
.panel-tab.active{color:var(--accent-dark);border-bottom-color:var(--accent);background:#fff;}

.panel-body{flex:1;overflow-y:auto;padding:18px 20px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:2px;}

/* 패널 섹션 타이틀 */
.psec-title{font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.psec-title::after{content:'';flex:1;height:1px;background:var(--border-light);}
.psec{margin-bottom:18px;}

/* 알림장 헤더 정보 */
.notice-info-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg-base);border-radius:var(--radius-md);border:1px solid var(--border-light);margin-bottom:10px;}
.ni-icon{font-size:18px;}
.ni-text{flex:1;}
.ni-main{font-size:13px;font-weight:700;color:var(--text-primary);}
.ni-sub{font-size:11px;color:var(--text-secondary);}

/* 본문 */
.notice-content-box{background:var(--bg-base);border-radius:var(--radius-md);border:1px solid var(--border-light);padding:12px 14px;font-size:13px;line-height:1.7;color:var(--text-primary);}

/* 종합 평가 요약 카드 */
.eval-summary-card{border-radius:var(--radius-md);padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.eval-summary-card.good{background:var(--green-bg);border:1px solid #A7F3D0;}
.eval-summary-card.ok{background:#F0FDF4;border:1px solid #BBF7D0;}
.eval-summary-card.check{background:var(--amber-bg);border:1px solid #FCD34D;}
.eval-summary-icon{font-size:20px;}
.eval-summary-text{font-size:13px;font-weight:700;}
.eval-summary-text.good{color:var(--green-text);}
.eval-summary-text.ok{color:#15803D;}
.eval-summary-text.check{color:var(--amber-text);}

.eval-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.eval-item{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;}
.eval-item-label{font-size:10px;color:var(--text-secondary);font-weight:600;margin-bottom:3px;}
.eval-item-val{font-size:12px;font-weight:700;}
.eval-val-good{color:var(--green-text);}
.eval-val-ok{color:var(--text-secondary);}
.eval-val-bad{color:var(--red-text);}

/* 체크필드 그리드 */
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.check-item{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:9px 12px;}
.check-label{font-size:10px;color:var(--text-secondary);font-weight:600;margin-bottom:4px;}
.check-values{display:flex;flex-wrap:wrap;gap:4px;}
.check-chip{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;}
.cv-present{background:var(--green-bg);color:var(--green-text);}
.cv-absent{background:var(--red-bg);color:var(--red-text);}
.cv-late{background:var(--amber-bg);color:var(--amber-text);}
.cv-good{background:var(--green-bg);color:var(--green-text);}
.cv-some{background:var(--blue-bg);color:var(--blue-text);}
.cv-no{background:#F3F4F6;color:#6B7280;}
.cv-normal{background:var(--green-bg);color:var(--green-text);}

/* 활동 태그 */
.activity-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.activity-tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px;background:var(--accent-light);color:var(--accent-dark);}

/* 개별 메모 */
.memo-box{background:var(--bg-base);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:10px 12px;font-size:13px;line-height:1.6;color:var(--text-primary);}

/* ━━━ 댓글 ━━━ */
.comment-section{border-top:1px solid var(--border-light);padding-top:14px;}
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
.comment-item{display:flex;gap:10px;}
.comment-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.comment-bubble{flex:1;background:var(--bg-base);border-radius:0 10px 10px 10px;padding:8px 12px;border:1px solid var(--border-light);}
.comment-bubble.teacher-bubble{background:var(--accent-light);border-color:var(--border-medium);}
.comment-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.comment-author{font-size:12px;font-weight:700;color:var(--text-primary);}
.comment-role{font-size:10px;font-weight:600;padding:1px 6px;border-radius:6px;}
.cr-teacher{background:var(--blue-bg);color:var(--blue-text);}
.cr-parent{background:var(--green-bg);color:var(--green-text);}
.comment-time{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;margin-left:auto;}
.comment-text{font-size:12.5px;line-height:1.55;color:var(--text-primary);}
.reply-item{margin-left:30px;}
.reply-item .comment-bubble{background:#fff;border:1px dashed var(--border-medium);}

/* 댓글 입력 */
.comment-input-wrap{display:flex;gap:8px;align-items:flex-end;}
.comment-textarea{flex:1;border:1.5px solid var(--border-light);border-radius:var(--radius-md);padding:9px 12px;font-size:12.5px;font-family:'Pretendard',sans-serif;resize:none;height:60px;outline:none;transition:border-color .18s;line-height:1.5;}
.comment-textarea:focus{border-color:var(--accent);}
.comment-send-btn{height:60px;width:44px;border-radius:var(--radius-md);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;transition:.18s;flex-shrink:0;}
.comment-send-btn:hover{background:var(--accent-dark);}

.panel-footer{padding:12px 20px;border-top:1px solid var(--border-light);flex-shrink:0;display:flex;gap:8px;justify-content:flex-end;background:#FAFCFF;}

/* ━━━ 작성 패널 (760px) ━━━ */
.write-panel{position:fixed;right:0;top:0;height:100vh;width:760px;background:#fff;z-index:400;box-shadow:-8px 0 40px rgba(12,45,72,.14);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.write-panel.show{transform:translateX(0);}

.write-header{height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.write-header-actions{display:flex;align-items:center;gap:8px;}
.write-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;}

.write-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.write-body::-webkit-scrollbar{width:4px;}
.write-body::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:2px;}

.write-section{padding:18px 24px;border-bottom:1px solid var(--border-light);}
.write-section-title{font-size:12px;font-weight:800;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.write-section-title .ws-icon{font-size:15px;}
.write-section-title::after{content:'';flex:1;height:1px;background:var(--border-light);}

/* 폼 */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
.form-row.tri{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:12px;font-weight:700;color:var(--text-secondary);display:flex;align-items:center;gap:4px;}
.form-label .req{color:var(--red);font-size:10px;}
.form-input,.form-select,.form-textarea{height:38px;padding:0 12px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text-primary);transition:border-color .18s;outline:none;background:#fff;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{height:100px;padding:10px 12px;resize:vertical;width:100%;}

/* 날씨 버튼 그룹 */
.weather-group{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.weather-btn{padding:5px 12px;border-radius:var(--radius-md);border:1.5px solid var(--border-light);background:#fff;cursor:pointer;font-size:12px;font-family:'Pretendard',sans-serif;font-weight:600;transition:.18s;display:flex;align-items:center;gap:4px;color:var(--text-secondary);}
.weather-btn:hover{border-color:var(--accent);}
.weather-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent-dark);}

/* AI 버튼 */
.ai-toolbar{display:flex;gap:6px;margin-top:8px;}
.ai-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius-md);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Pretendard',sans-serif;transition:.18s;}
.ai-btn-gen{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;}
.ai-btn-gen:hover{background:linear-gradient(135deg,#4F46E5,#7C3AED);}
.ai-btn-polish{background:linear-gradient(135deg,#0EA5E9,#38BDF8);color:#fff;}
.ai-btn-polish:hover{background:linear-gradient(135deg,#0284C7,#0EA5E9);}
.ai-btn-fill{background:linear-gradient(135deg,#10B981,#34D399);color:#fff;}
.ai-btn-fill:hover{background:linear-gradient(135deg,#059669,#10B981);}
.ai-loading{opacity:.6;pointer-events:none;}

/* 종합평가 (공통) */
.eval-write-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.eval-write-item{background:var(--bg-base);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:10px;text-align:center;}
.eval-write-label{font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;}
.eval-write-opts{display:flex;justify-content:center;gap:4px;}
.eval-opt{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border-light);background:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:'Pretendard',sans-serif;transition:.18s;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;}
.eval-opt:hover{border-color:var(--accent);}
.eval-opt.sel-good{border-color:var(--green);background:var(--green-bg);color:var(--green-text);}
.eval-opt.sel-ok{border-color:var(--amber);background:var(--amber-bg);color:var(--amber-text);}
.eval-opt.sel-bad{border-color:var(--red);background:var(--red-bg);color:var(--red-text);}

/* 원아 선택 (카드형 그리드) */
.child-select-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.child-select-card{border:2px solid var(--border-light);border-radius:var(--radius-md);padding:10px 6px;cursor:pointer;transition:.18s;text-align:center;}
.child-select-card:hover{border-color:var(--accent);background:var(--accent-light);}
.child-select-card.selected{border-color:var(--accent);background:var(--accent-light);}
.csc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;margin:0 auto 6px;}
.csc-name{font-size:12px;font-weight:700;color:var(--text-primary);}
.csc-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border-medium);margin:4px auto 0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;}
.child-select-card.selected .csc-check{background:var(--accent);border-color:var(--accent);}

/* 원아별 작성 카드 (그리드) */
.write-child-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;padding:18px 24px;}
.write-child-card{border:1.5px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .18s;}
.write-child-card:hover{border-color:var(--border-medium);}
.wcc-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-base);border-bottom:1px solid var(--border-light);}
.wcc-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.wcc-name{font-size:14px;font-weight:800;color:var(--text-primary);flex:1;}
.wcc-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.wfield-label{font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:4px;}

/* 체크 버튼 그룹 */
.check-btn-group{display:flex;flex-wrap:wrap;gap:5px;}
.check-btn{padding:4px 10px;border-radius:8px;border:1.5px solid var(--border-light);background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.18s;color:var(--text-secondary);}
.check-btn:hover{border-color:var(--accent);color:var(--accent-dark);}
.check-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.check-btn.active.green{background:var(--green);border-color:var(--green);}
.check-btn.active.red{background:var(--red);border-color:var(--red);}
.check-btn.active.amber{background:var(--amber);border-color:var(--amber);}

/* 낮잠 시간 */
.nap-time-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.nap-time-input{width:80px;height:30px;padding:0 8px;border:1.5px solid var(--border-light);border-radius:var(--radius-sm);font-size:12px;font-family:'Pretendard',sans-serif;outline:none;}
.nap-time-input:focus{border-color:var(--accent);}
.nap-time-sep{font-size:12px;color:var(--text-muted);}

/* 활동 태그 */
.tag-select-wrap{display:flex;flex-wrap:wrap;gap:4px;}
.tag-btn{padding:3px 9px;border-radius:8px;border:1.5px solid var(--border-light);background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.18s;color:var(--text-secondary);}
.tag-btn:hover{border-color:var(--accent);}
.tag-btn.sel{background:var(--accent-light);color:var(--accent-dark);border-color:var(--accent);}
.tag-btn.sel.outdoor{background:var(--green-bg);color:var(--green-text);border-color:#A7F3D0;}

/* 식사 그리드 */
.meal-write-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* 작성 푸터 */
.write-footer{padding:14px 24px;border-top:1px solid var(--border-light);flex-shrink:0;display:flex;gap:8px;justify-content:flex-end;background:#FAFCFF;}

/* ━━━ 토스트 ━━━ */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:900;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1A1D2E;color:#fff;padding:10px 16px;border-radius:var(--radius-md);font-size:13px;box-shadow:var(--shadow-lg);animation:toastIn .25s ease;display:flex;align-items:center;gap:8px;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
@keyframes toastIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}

/* ━━━ 종합 평가 (원아별) ━━━ */
.eval-per-child{border-top:1.5px dashed var(--border-light);margin-top:14px;padding-top:14px;display:flex;flex-direction:column;gap:12px;}
.eval-field{display:flex;flex-direction:column;gap:5px;}
.eval-field-lbl{font-size:11px;font-weight:700;color:var(--text-secondary);}
.eval-opts{display:flex;gap:5px;}
.eval-opt-btn{padding:4px 14px;border-radius:8px;border:1.5px solid var(--border-light);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.18s;color:var(--text-secondary);}
.eval-opt-btn:hover{border-color:var(--accent);}
.eval-opt-btn.e-good{background:var(--green-bg);color:var(--green-text);border-color:var(--green);}
.eval-opt-btn.e-ok{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber);}
.eval-opt-btn.e-bad{background:var(--red-bg);color:var(--red-text);border-color:var(--red);}
.eval-expand{background:var(--bg-base);border-radius:var(--radius-md);padding:10px;display:flex;flex-direction:column;gap:8px;border:1px dashed var(--border-medium);}
.eval-expand-lbl{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.eval-temp-inp{width:90px;height:30px;padding:0 8px;border:1.5px solid var(--border-light);border-radius:var(--radius-sm);font-size:13px;font-family:'Pretendard',sans-serif;outline:none;}
.eval-temp-inp:focus{border-color:var(--red);}
.symptom-chip-wrap{display:flex;flex-wrap:wrap;gap:4px;}
.symptom-chip{padding:3px 9px;border-radius:8px;border:1.5px solid var(--border-light);background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.18s;color:var(--text-secondary);}
.symptom-chip:hover{border-color:var(--red);}
.symptom-chip.sel{background:var(--red-bg);color:var(--red-text);border-color:var(--red);}
.toilet-state-btn{padding:3px 9px;border-radius:8px;border:1.5px solid var(--border-light);background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.18s;color:var(--text-secondary);}
.toilet-state-btn:hover{border-color:var(--amber);}
.toilet-state-btn.sel{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber);}
.toilet-count-inp{width:54px;height:30px;padding:0 6px;border:1.5px solid var(--border-light);border-radius:var(--radius-sm);font-size:13px;font-family:'Pretendard',sans-serif;outline:none;text-align:center;}
.toilet-count-inp:focus{border-color:var(--amber);}
.eval-memo-ta{width:100%;height:56px;padding:8px 10px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);font-size:12px;font-family:'Pretendard',sans-serif;resize:none;outline:none;line-height:1.5;color:var(--text-primary);background:#fff;}
.eval-memo-ta:focus{border-color:var(--accent);}

/* ━━━ 예약 발행 모달 ━━━ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:var(--radius-xl);width:400px;max-width:94vw;box-shadow:var(--shadow-modal);animation:modalIn .22s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:20px 24px 14px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:800;}
.modal-close{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--border-light);background:var(--bg-base);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text-secondary);}
.modal-close:hover{background:var(--red-bg);color:var(--red);border-color:#FECACA;}
.modal-body{padding:18px 24px;}
.modal-footer{padding:12px 24px;border-top:1px solid var(--border-light);display:flex;gap:8px;justify-content:flex-end;}
</style>
</head>
<body>

<!-- ━━━ SIDEBAR ━━━ -->
<aside id="appSidebar"></aside>

<!-- ━━━ MAIN ━━━ -->
<div class="main-wrap">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="breadcrumb">
      <span>🏠</span><span class="bc-sep">›</span>
      <span id="breadcrumbOrg">운영관리</span><span class="bc-sep">›</span>
      <span class="cur">알림장</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-date" id="topDate"></span>
      <div class="icon-btn notif-dot" title="알림">🔔</div>
      <div class="icon-btn" title="설정">⚙️</div>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">📋 알림장</div>
        <div class="page-sub">교사 ↔ 학부모 알림장 현황을 확인하고 관리합니다</div>
      </div>
    </div>

    <!-- 오늘의 현황 -->
    <div class="today-section">
      <div class="today-section-header">
        <div class="today-section-title">📅 오늘의 현황</div>
        <span class="today-section-meta" id="todayMeta"></span>
      </div>
      <div class="today-children-grid" id="todayChildrenGrid"></div>
    </div>

    <!-- 탭 -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabSent" onclick="switchTab('sent')">
        📤 보낸 알림장 <span class="tab-count" id="sentCount">0</span>
      </button>
      <button class="tab-btn" id="tabReceived" onclick="switchTab('received')">
        📥 받은 알림장 <span class="tab-count" id="receivedCount">0</span>
      </button>
    </div>

    <!-- 필터바 (보낸) -->
    <div class="filter-bar" id="sentFilterBar">
      <div class="filter-group">
        <div class="fsel-wrap" id="classFilterGroup">
          <select class="fsel" id="classFilter" onchange="applyFilters()"><!-- JS 렌더링 --></select>
        </div>
        <div class="fsel-wrap">
          <select class="fsel" id="filterStatus" onchange="applyFilters()">
            <option value="">전체 상태</option>
            <option value="published">발행됨</option>
            <option value="draft">임시저장</option>
            <option value="recalled">회수됨</option>
            <option value="scheduled">예약발행</option>
          </select>
        </div>
        <div class="filter-date-range">

function initClassFilter() {
  const sel = document.getElementById('classFilter');
  if (!sel) return;
  sel.innerHTML = '';
  if (NB_USER_ROLE !== 'teacher') {
    sel.innerHTML += '<option value="">전체 반</option>';
  }
  NB_ALL_CLASSES.forEach(cls => {
    const isAssigned = !NB_ASSIGNED || NB_ASSIGNED.some(a => a.id === cls.id);
    const opt = document.createElement('option');
    opt.value = cls.id;
    opt.textContent = cls.name;
    if (!isAssigned) { opt.disabled = true; opt.textContent += ' — 비담당'; }
    sel.appendChild(opt);
  });
  if (NB_USER_ROLE === 'teacher' && NB_ASSIGNED && NB_ASSIGNED.length > 0) {
    sel.value = NB_ASSIGNED[0].id;
  }
}

function renderTodayDashboard() {

    '병결':  { cls:'tcc-sick',    labelCls:'tcc-al-sick'    },
    '조퇴':  { cls:'tcc-leave',   labelCls:'tcc-al-leave'   },
    '미확인':{ cls:'tcc-unknown', labelCls:'tcc-al-unknown' },
  };

  grid.innerHTML = children.map(c => {
    const cfg = attendConfig[c.attendance] || attendConfig['미확인'];
    const commentDot = c.parentComment
      ? `<div class="tcc-comment-dot" title="학부모 댓글 있음">!</div>` : '';
    const noticeBadge = c.noticeWritten
      ? `<span class="tcc-notice-badge tcc-notice-done">✅ 작성완료</span>`
      : `<span class="tcc-notice-badge tcc-notice-none">✏️ 미작성</span>`;

        <span class="tcc-attend-label ${cfg.labelCls}">${c.attendance}</span>

}

// ━━━ 목록 렌더 ━━━
function renderList(tab) {
  const area = document.getElementById('listArea');
  if (tab === 'sent') {
    renderSentList(area);
  } else {
    renderReceivedList(area);
  }
}

function renderSentList(area) {
  const classVal   = (document.getElementById('classFilter')    || {}).value || '';
  const statusVal  = (document.getElementById('filterStatus')   || {}).value || '';
  const childVal   = ((document.getElementById('filterChildName') || {}).value || '').trim().toLowerCase();
  const dateFrom   = (document.getElementById('filterDateFrom') || {}).value || '';
  const dateTo     = (document.getElementById('filterDateTo')   || {}).value || '';

  const classMap = { CLS001:'햇님반', CLS002:'달님반', CLS003:'별님반' };
  let data = MOCK_SENT.filter(n => {
    if (classVal  && n.class !== classMap[classVal]) return false;
    if (statusVal && n.status !== statusVal) return false;
    if (childVal  && !n.children.some(c => c.name.toLowerCase().includes(childVal))) return false;
    if (dateFrom  && n.date < dateFrom) return false;
    if (dateTo    && n.date > dateTo)   return false;
    return true;
  });

  document.getElementById('sentCount').textContent = data.length;
  document.getElementById('listCount').textContent = data.length;

  if (data.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">조건에 맞는 알림장이 없습니다</div></div>`;
    return;
  }

  const grouped = {};
  data.forEach(n => {
    if (!grouped[n.date]) grouped[n.date] = [];
    grouped[n.date].push(n);
  });

  area.innerHTML = Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0])).map(([date, notices]) => {
    const d = new Date(date);
    const label = d.toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'short' });
    const cards = notices.map(n => {
      const wi = WEATHER_ICON[n.weather] || '';
      const parentComments = n.children.reduce((a,c)=>a+c.comments.filter(cm=>cm.type==='parent').length,0);

      // 원아 chips — 읽음/미읽음 구분, 최대 5개
      const childChips = n.children.length > 0
        ? n.children.slice(0,5).map(c => {
            const isRead = c.isRead;
            const chipStyle = isRead
              ? 'border-color:#A7F3D0;background:#F0FDF4;'
              : 'border-color:#FED7AA;background:#FFF7ED;';
            return `<span class="nc-child-chip" style="${chipStyle}"><span class="nc-child-chip-av" style="background:${c.color}">${c.name[0]}</span>${c.name}</span>`;
          }).join('') + (n.children.length > 5 ? `<span class="nc-child-chip" style="background:#F3F4F6;color:#6B7280;border:none">+${n.children.length-5}</span>` : '')
        : `<span style="font-size:11px;color:var(--text-muted)">원아 ${n.childCount}명</span>`;

      // 댓글 뱃지
      const commentBadge = parentComments > 0
        ? `<span class="nc-comment-badge">💬 학부모 댓글 ${parentComments}</span>`
        : '';

      return `
        <div class="notice-card" onclick="openSentDetail('${n.id}')">
          <div class="nc-accent ${n.status}"></div>
          <div class="nc-left">
            <!-- 교사 행 -->
            <div class="nc-teacher-row">
              <div class="nc-teacher-av" style="background:${n.teacherColor||'#0EA5E9'}">${(n.teacher||'?')[0]}</div>
              <div class="nc-teacher-info">
                <div class="nc-teacher-name">${n.teacher} 선생님</div>
                <div class="nc-teacher-class">${n.class}</div>
              </div>
              <span class="nbadge nb-${n.status}">
                <span class="nbadge-dot" style="background:${statusDotColor(n.status)}"></span>
                ${n.statusLabel}
              </span>
              ${n.hasAi ? '<span class="nc-ai-badge">✨ AI</span>' : ''}
            </div>
            <!-- 날씨·기온 -->
            <div class="nc-meta">
              ${n.weather ? `<span class="nc-meta-item"><span class="nc-weather">${wi}</span> ${n.weather} · ${n.temperature}</span>` : ''}
            </div>
            <!-- 본문 미리보기 -->
            <div class="nc-preview">${n.content}</div>
            <!-- 원아 chips -->
            <div class="nc-children">${childChips}</div>
            <!-- 카드 푸터 -->
            <div class="nc-footer">
              <div class="nc-footer-meta">
                <span class="nc-footer-item">👁️ ${n.readCount}/${n.childCount}</span>
                <span class="nc-footer-item">📸 ${n.photoCount||0}</span>
                <span class="nc-footer-item">💬 ${n.commentCount}</span>
                ${commentBadge}
                <span class="nc-footer-item" style="margin-left:auto;font-family:'JetBrains Mono',monospace">${n.publishedAt||'--:--'}</span>
              </div>
              <div class="nc-act-btns" onclick="event.stopPropagation()">
                <div class="nc-act-btn" title="수정" onclick="showToast('수정 기능은 준비 중입니다.')">✏️</div>
                ${n.status==='published'?`<div class="nc-act-btn" title="회수" onclick="showToast('알림장이 회수되었습니다.')">↩️</div>`:''}
                <div class="nc-act-btn danger" title="삭제" onclick="showToast('삭제 기능은 권한 확인 후 처리됩니다.','error')">🗑️</div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="date-group">
        <div class="date-group-header">
          <span class="date-group-label">${label}</span>
          <div class="date-group-line"></div>
          <span class="date-group-count">${notices.length}건</span>
        </div>
        ${cards}
      </div>`;
  }).join('');
}

function statusDotColor(s) {
  return s==='published'?'#10B981':s==='draft'?'#9CA3AF':s==='recalled'?'#EF4444':'#3B82F6';
}

// ━━━ 보낸 알림장 상세 ━━━
function openSentDetail(id) {
  const notice = MOCK_SENT.find(n => n.id === id);
  if (!notice) return;
  document.getElementById('sdpTitle').textContent = notice.date + ' ' + notice.class;

  // 원아 탭
  const tabs = document.getElementById('sdpChildTabs');
  tabs.innerHTML = `<div class="panel-tab active" onclick="switchChildTab(this,0)">📋 공통</div>` +
    notice.children.map((c,i) => `
      <div class="panel-tab" onclick="switchChildTab(this,${i+1})">
        ${c.name} ${!c.isRead && c.commentCount > 0 ? '<span style="color:var(--red)">●</span>' : ''}
      </div>`).join('');

  renderSentDetailCommon(notice);
  showPanel('sentDetailPanel');
}

function switchChildTab(el, idx) {
  document.querySelectorAll('#sdpChildTabs .panel-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const noticeId = document.querySelector('#sentDetailPanel .panel-title span').textContent;
  const notice = MOCK_SENT.find(n => (n.date + ' ' + n.class) === noticeId);
  if (!notice) return;
  if (idx === 0) renderSentDetailCommon(notice);
  else renderSentDetailChild(notice, notice.children[idx - 1]);
}

function renderSentDetailChild(notice, child) {
  const evalMap = { '좋음':'good', '보통':'ok', '나쁨':'bad' };
  const evalLabelsD = [
    {key:'mood',label:'기분'},{key:'health',label:'건강'},{key:'meal',label:'식사량'},
    {key:'toilet',label:'배변'},{key:'activity',label:'참여도'},{key:'social',label:'교우관계'}
  ];
  const de = child.dailyEval || {};
  const vals = Object.values(de).filter(Boolean);
  const goodCnt = vals.filter(v=>v==='좋음').length;
  const badCnt  = vals.filter(v=>v==='나쁨').length;
  const summary = child.evalSummary || (badCnt>=1 ? '확인이 필요해요 ⚠️' : goodCnt>=4 ? '아주 좋아요 👍' : '무난해요 😊');
  const sumCls = summary.includes('👍') ? 'good' : summary.includes('⚠️') ? 'check' : 'ok';
  const evalGridHTML = evalLabelsD.map(e => {
    const val = de[e.key];
    const vc = val ? 'eval-val-' + evalMap[val] : '';
    return `<div class="eval-item"><div class="eval-item-label">${e.label}</div><div class="eval-item-val ${vc}">${val||'—'}</div></div>`;
  }).join('');

  const comments = child.comments.map(cm => {
    const isTeacher = cm.type === 'teacher';
    const wrapClass = cm.isReply ? 'comment-item reply-item' : 'comment-item';
    return `
      <div class="${wrapClass}">
        <div class="comment-avatar" style="background:${cm.color}">${cm.author[0]}</div>
        <div class="comment-bubble ${isTeacher?'teacher-bubble':''}">
          <div class="comment-meta">
            <span class="comment-author">${cm.author}</span>
            <span class="comment-role ${isTeacher?'cr-teacher':'cr-parent'}">${isTeacher?'교사':'학부모'}</span>
            <span class="comment-time">${cm.time}</span>
          </div>
          <div class="comment-text">${cm.text}</div>
        </div>
      </div>`;
  }).join('');

  const body = document.getElementById('sdpBody');
  body.innerHTML = `
    <div class="psec">
      <div class="psec-title">📊 종합 평가</div>
      <div class="eval-summary-card ${sumCls}" style="margin-bottom:10px">
        <span class="eval-summary-icon">${summary.slice(-2)}</span>
        <span class="eval-summary-text ${sumCls}">${summary}</span>
      </div>
      <div class="eval-grid">${evalGridHTML}</div>
    </div>
    <div class="psec">
      <div class="psec-title">출결 및 체크필드</div>
      <div class="check-grid">
        <div class="check-item"><div class="check-label">출결</div><div class="check-values">
          <span class="check-chip ${child.attendance==='출석'?'cv-present':child.attendance==='결석'?'cv-absent':'cv-late'}">${child.attendance}</span>
        </div></div>
        <div class="check-item"><div class="check-label">점심</div><div class="check-values">
          <span class="check-chip ${child.mealLunch==='잘먹음'?'cv-good':child.mealLunch==='조금먹음'?'cv-some':'cv-no'}">${child.mealLunch}</span>
        </div></div>
        <div class="check-item"><div class="check-label">낮잠</div><div class="check-values">
          <span class="check-chip cv-good">${child.napStatus}</span>
          <span style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono'">${child.napTime}</span>
        </div></div>
        <div class="check-item"><div class="check-label">배변</div><div class="check-values">
          <span class="check-chip cv-normal">${child.toiletStatus}</span>
          <span style="font-size:11px;color:var(--text-muted)">${child.toiletCount}회</span>
        </div></div>
      </div>
    </div>
    <div class="psec">
      <div class="psec-title">활동</div>
      <div style="margin-bottom:6px;"><div style="font-size:11px;color:var(--text-secondary);font-weight:600;margin-bottom:4px;">실내</div>
        <div class="activity-tags">${child.activityIndoor.map(a=>`<span class="activity-tag">${a}</span>`).join('')||'<span style="font-size:12px;color:var(--text-muted)">—</span>'}</div>
      </div>
      <div><div style="font-size:11px;color:var(--text-secondary);font-weight:600;margin-bottom:4px;">실외</div>
        <div class="activity-tags">${child.activityOutdoor.map(a=>`<span class="activity-tag">${a}</span>`).join('')||'<span style="font-size:12px;color:var(--text-muted)">—</span>'}</div>
      </div>
    </div>
    <div class="psec">
      <div class="psec-title">개별 메모</div>
      <div class="memo-box">${child.individualMemo||'—'}</div>
    </div>
    <div class="comment-section">
      <div class="psec-title" style="margin-bottom:12px;">댓글 · 대댓글</div>

  { id:'C002', name:'이서연', color:'#10B981' },
  { id:'C003', name:'박준서', color:'#F59E0B' },
  { id:'C004', name:'최지아', color:'#8B5CF6' },
  { id:'C005', name:'한민준', color:'#EF4444' }
];

let writeSelectedChildren = new Set(['C001','C002','C003']);
let writeSelectedWeather = '맑음';

const CHILD_STATE = {};
WRITE_CHILDREN.forEach(c => {
  CHILD_STATE[c.id] = {
    health:[], mealLunch:'', mealSnackAm:'', mealSnackPm:'',
    napStatus:'', napStart:'', napEnd:'',
    actIndoor:[], actOutdoor:[],
    memo:'',
    // 종합 평가 (원아별)
    evalMood:'',
    evalHealth:'', evalHealthTemp:'', evalHealthSymptoms:[], evalHealthMemo:'',
    evalMeal:'', evalMealMemo:'',
    evalToilet:'', evalToiletState:'', evalToiletCount:'', evalToiletMemo:'',
    evalActivity:'', evalActivityMemo:'',
    evalSocial:'', evalSocialMemo:''
  };
});

const WEATHER_OPTS = [{key:'맑음',icon:'☀️'},{key:'흐림',icon:'☁️'},{key:'비',icon:'🌧️'},{key:'눈',icon:'❄️'},{key:'안개',icon:'🌫️'}];
const INDOOR_TAGS = ['블록놀이','그림그리기','색칠하기','독서','퍼즐','역할놀이','율동','점토놀이'];
const OUTDOOR_TAGS = ['모래놀이','산책','자전거','공놀이','줄넘기','텃밭가꾸기'];
const MEAL_OPTS_W = ['잘먹음','조금먹음','안먹음','해당없음'];
const NAP_OPTS_W = ['잘잠','조금잠','못잠','안잠'];
const HEALTH_OPTS_W = ['양호','두통','발열','기침','콧물','설사','구토'];

function openWritePanel() {
  showPanel('writePanel');
  renderWritePanel();
}

function closeWritePanel() {
  document.getElementById('writePanel').classList.remove('show');
  document.getElementById('panelOverlay').classList.remove('show');
}

function renderWritePanel() {

          <select class="form-select" id="wClass">

            <option value="CLS001">햇님반</option>
            <option value="CLS002">달님반</option>
            <option value="CLS003">별님반</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="form-label">날씨</label>
        <div class="weather-group" id="wWeatherGroup">${weatherHTML}</div>
      </div>
      <div class="form-row" style="margin-top:10px;margin-bottom:0">
        <div class="form-group">
          <label class="form-label">최고 기온</label>
          <input class="form-input" type="text" id="wTempHigh" placeholder="예: 18°C">
        </div>
        <div class="form-group">
          <label class="form-label">최저 기온</label>
          <input class="form-input" type="text" id="wTempLow" placeholder="예: 9°C">
        </div>
      </div>
    </div>

    <div class="write-section">
      <div class="write-section-title"><span class="ws-icon">📝</span>공통 본문</div>
      <div class="form-group">
        <textarea class="form-textarea" id="wContent" style="height:120px" placeholder="오늘 하루 공통 내용을 입력하세요..."></textarea>
      </div>
      <div class="ai-toolbar" style="margin-top:6px">
        <button class="ai-btn ai-btn-gen" onclick="aiGenerate()">✨ AI 자동생성</button>
        <button class="ai-btn ai-btn-polish" onclick="aiPolish()">✦ 문장 다듬기</button>

    <div class="write-section">
      <div class="write-section-title"><span class="ws-icon">👶</span>원아 선택</div>

function setChildEval(cid, field, val) {
  CHILD_STATE[cid][field] = val;
  const card = document.getElementById(`wcc-${cid}`);
  if (card) card.outerHTML = renderWriteChildCardHTML(cid);
}

function toggleEvalSymptom(cid, sym) {
  const arr = CHILD_STATE[cid].evalHealthSymptoms;
  const idx = arr.indexOf(sym);
  if (idx > -1) arr.splice(idx, 1);
  else arr.push(sym);
  const card = document.getElementById(`wcc-${cid}`);
  if (card) card.outerHTML = renderWriteChildCardHTML(cid);
}

function renderWriteChildCardsHTML() {
  const selected = WRITE_CHILDREN.filter(c => writeSelectedChildren.has(c.id));
  if (selected.length === 0) {
    return '<div class="empty-state" style="padding:32px"><div class="empty-state-icon">👶</div><div class="empty-state-text">대상 원아를 선택하세요</div></div>';
  }
  return selected.map(c => renderWriteChildCardHTML(c.id)).join('');
}

    const isActive = st.health.includes(v);
    const colorCls = v==='양호' ? ' green' : isActive ? ' red' : '';

  }).join('');

  const mealOptHTML = (field, label) => `
    <div class="form-group">

  return `

function toggleWriteChild(cid, el) {
  if (writeSelectedChildren.has(cid)) writeSelectedChildren.delete(cid);
  else writeSelectedChildren.add(cid);
  el.classList.toggle('selected', writeSelectedChildren.has(cid));
  const checkEl = el.querySelector('.csc-check');
  if (checkEl) checkEl.textContent = writeSelectedChildren.has(cid) ? '✓' : '';
  const label = document.getElementById('selectedCountLabel');
  if (label) label.textContent = writeSelectedChildren.size + '명 선택됨';
  const cards = document.getElementById('writeChildCards');
  if (cards) cards.innerHTML = renderWriteChildCardsHTML();
}

function selectAllWriteChildren() {
  WRITE_CHILDREN.forEach(c => writeSelectedChildren.add(c.id));
  _refreshChildSelector();
  const cards = document.getElementById('writeChildCards');
  if (cards) cards.innerHTML = renderWriteChildCardsHTML();
}

function deselectAllWriteChildren() {
  writeSelectedChildren.clear();
  _refreshChildSelector();
  const cards = document.getElementById('writeChildCards');
  if (cards) cards.innerHTML = renderWriteChildCardsHTML();
}

function _refreshChildSelector() {
  const grid = document.getElementById('childSelectorGrid');
  if (grid) {
    grid.innerHTML = WRITE_CHILDREN.map(c => `
      <div class="child-select-card${writeSelectedChildren.has(c.id)?' selected':''}" onclick="toggleWriteChild('${c.id}',this)">
        <div class="csc-avatar" style="background:${c.color}">${c.name[0]}</div>
        <div class="csc-name">${c.name}</div>
        <div class="csc-check">${writeSelectedChildren.has(c.id)?'✓':''}</div>
      </div>`).join('');
  }
  const label = document.getElementById('selectedCountLabel');
  if (label) label.textContent = writeSelectedChildren.size + '명 선택됨';
}

function setCdField(cid, field, val) {
  CHILD_STATE[cid][field] = val;
  const card = document.getElementById(`wcc-${cid}`);
  if (card) card.outerHTML = renderWriteChildCardHTML(cid);
}

function setCdDirect(cid, field, val) {
  CHILD_STATE[cid][field] = val;
}

function toggleHealth(cid, val) {
  const arr = CHILD_STATE[cid].health;
  if (val === '양호') {
    CHILD_STATE[cid].health = arr.includes('양호') ? [] : ['양호'];
  } else {
    const hi = arr.indexOf('양호');
    if (hi > -1) arr.splice(hi, 1);
    const si = arr.indexOf(val);
    if (si > -1) arr.splice(si, 1);
    else arr.push(val);
  }
  const card = document.getElementById(`wcc-${cid}`);
  if (card) card.outerHTML = renderWriteChildCardHTML(cid);
}

function toggleActivity(cid, type, tag) {
  const arr = type === 'indoor' ? CHILD_STATE[cid].actIndoor : CHILD_STATE[cid].actOutdoor;
  const idx = arr.indexOf(tag);
  if (idx > -1) arr.splice(idx, 1);
  else arr.push(tag);
  const card = document.getElementById(`wcc-${cid}`);
  if (card) card.outerHTML = renderWriteChildCardHTML(cid);
}

function selectWriteWeather(btn, w) {
  writeSelectedWeather = w;
  document.querySelectorAll('#wWeatherGroup .weather-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function aiGenChild(cid, btn) {
  if (btn) { btn.classList.add('ai-loading'); btn.textContent = '⏳ 생성 중...'; }
  setTimeout(() => {
    const name = WRITE_CHILDREN.find(c => c.id === cid)?.name || '';
    CHILD_STATE[cid].memo = `${name} 어린이는 오늘 활동에 적극적으로 참여했으며 건강하게 하루를 보냈습니다.`;
    const card = document.getElementById(`wcc-${cid}`);
    if (card) card.outerHTML = renderWriteChildCardHTML(cid);
    showToast('AI가 자동으로 채워넣었습니다.', 'success');
  }, 900);
}

// AI 기능 (정적 목업)
function aiGenerate() {
  const btn = document.querySelector('.ai-btn-gen');
  btn.classList.add('ai-loading');
  btn.textContent = '⏳ 생성 중...';
  setTimeout(() => {
    document.getElementById('wContent').value =
      '안녕하세요! 오늘도 아이들과 즐거운 하루를 보냈습니다. ' +
      '봄 날씨답게 따뜻한 햇살 아래 바깥 놀이를 하며 신나는 시간을 가졌어요. ' +
      '아이들 모두 건강하고 밝은 하루를 보냈으니 안심하세요. ' +
      '오늘 하루도 사랑으로 돌봐주셔서 감사합니다. 💕';
    btn.classList.remove('ai-loading');
    btn.textContent = '✨ AI 자동생성';
    showToast('AI가 본문을 생성했습니다.', 'success');
  }, 1200);
}

function aiPolish() {
  const ta = document.getElementById('wContent');
  if (!ta.value.trim()) { showToast('먼저 내용을 입력해 주세요.'); return; }
  const btn = document.querySelector('.ai-btn-polish');
  btn.classList.add('ai-loading');
  btn.textContent = '⏳ 다듬는 중...';
  setTimeout(() => {
    ta.value = ta.value
      .replace(/했습니다\./g, '했어요.')
      .replace(/입니다\./g, '이에요.')
      .replace(/합니다\./g, '해요.')
      .replace(/있습니다\./g, '있어요.');
    btn.classList.remove('ai-loading');
    btn.textContent = '✦ 문장 다듬기';
    showToast('문장이 부드럽게 다듬어졌습니다.', 'success');
  }, 900);
}

function saveDraft() {
  showToast('임시저장되었습니다.', 'success');
}

function publishNotice() {
  const cls = document.getElementById('wClass').value;
  if (!cls) { showToast('반을 선택해 주세요.'); return; }
  if (writeSelectedChildren.size === 0) { showToast('대상 원아를 선택해 주세요.'); return; }
  showToast(`알림장이 발행되었습니다. (${writeSelectedChildren.size}명)`, 'success');
  closeWritePanel();
}

function applyFilters() {
  renderTodayDashboard();
  renderList(currentTab);
}

function resetSentFilters() {
  ['classFilter','filterStatus','filterChildName','filterDateFrom','filterDateTo',
   'receivedCategory','receivedReadStatus','receivedChildName'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  applyFilters();
}

// ━━━ 토스트 ━━━
function showToast(msg, type) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.innerHTML = (type === 'success' ? '✅ ' : type === 'error' ? '❌ ' : 'ℹ️ ') + msg;
  wrap.appendChild(t);
  setTimeout(() => t.style.opacity = '0', 2200);
  setTimeout(() => t.remove(), 2600);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAllPanels(); });
</script>
</body>
</html>
